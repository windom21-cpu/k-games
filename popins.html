<script>
'use strict';

// ============================================================
// 論理座標系（M1: 横スクロールなし、固定画面）
// ============================================================
// 論理座標。H は固定、W はビューポートのアスペクトに合わせて動的に変わる
let W = 960;
const H = 540;
const W_MIN = 720;   // 縦長ウィンドウでも最低限の横幅を確保
const W_MAX = 1920;  // 極端なウルトラワイド対策

// ============================================================
// DOM
// ============================================================
const cv = document.getElementById('canvas');
const ctx = cv.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
const elCoins = document.getElementById('coins');
const elScore = document.getElementById('score');
const elComboBest = document.getElementById('combo-best');
const elStage = document.getElementById('stage');
const elBallStock = document.getElementById('ballstock');
const elMuteBtn = document.getElementById('mute-btn');
const elSeasonEmoji = document.getElementById('season-emoji');
const elSeasonLabel = document.getElementById('season-label');
const elMsg = document.getElementById('msg');
const elContinueOverlay = document.getElementById('continue-overlay');
const elContinueCoins = document.getElementById('continue-coins');
const elContinueBtn = document.getElementById('continue-btn');
const elEndBtn = document.getElementById('end-btn');
const elGameoverOverlay = document.getElementById('gameover-overlay');
const elGoCoins = document.getElementById('go-coins');
const elGoStage = document.getElementById('go-stage');
const elGoLoop = document.getElementById('go-loop');
const elGoNewRecord = document.getElementById('go-newrecord');
const elRestartBtn = document.getElementById('restart-btn');
const elTitleOverlay = document.getElementById('title-overlay');
const elTitleStartBtn = document.getElementById('title-start-btn');
const elTitleResumeBtn = document.getElementById('title-resume-btn');
const elHiscoreList = document.getElementById('hiscore-list');

// ============================================================
// オーディオ（WebAudio API で自前合成）
// ============================================================
let audioCtx = null;
let muted = localStorage.getItem('popins-muted') === '1';
let masterGain = null;
function ensureAudio() {
  if (!audioCtx) {
    try {
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) return;
      audioCtx = new Ctor();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.5;
      masterGain.connect(audioCtx.destination);
    } catch (e) { audioCtx = null; return; }
  }
  // suspended / interrupted どちらでも resume を試みる（iOS Safari は interrupted を返すことがある）
  if (audioCtx.state !== 'running') {
    try { audioCtx.resume(); } catch (e) {}
  }
  // 一回鳴らないとロック解除されない iOS 対策：無音1サンプルを鳴らす
  if (!audioCtx._unlocked) {
    try {
      const buf = audioCtx.createBuffer(1, 1, 22050);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      src.start(0);
      audioCtx._unlocked = true;
    } catch (e) {}
  }
}
// あらゆるユーザー操作起点で audio を解除しに行く
['pointerdown', 'touchstart', 'touchend', 'mousedown', 'click', 'keydown'].forEach(ev => {
  window.addEventListener(ev, ensureAudio, { passive: true, capture: true });
});

function playTone(freq, dur, type = 'square', vol = 0.15, attack = 0.005) {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + attack);
  g.gain.exponentialRampToValueAtTime(0.0001, t + attack + dur);
  osc.connect(g).connect(masterGain);
  osc.start(t);
  osc.stop(t + attack + dur + 0.05);
}
function playSweep(f1, f2, dur, type = 'square', vol = 0.12) {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(f1, t);
  osc.frequency.exponentialRampToValueAtTime(Math.max(20, f2), t + dur);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g).connect(masterGain);
  osc.start(t);
  osc.stop(t + dur + 0.05);
}
function playNoise(dur, vol = 0.08, lp = 1500) {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = lp;
  const g = audioCtx.createGain();
  g.gain.value = vol;
  src.connect(filter).connect(g).connect(masterGain);
  src.start(t);
}

// 効果音セット
const SE = {
  launch:   () => { playSweep(700, 1500, 0.06, 'square', 0.10); },
  bounce:   () => { playTone(680, 0.04, 'triangle', 0.08); }, // 傘で跳ね返り
  hit:      () => { playTone(420 + Math.random() * 80, 0.04, 'square', 0.06); }, // ブロックヒット
  break:    () => { playNoise(0.08, 0.10, 2200); playTone(550, 0.05, 'sawtooth', 0.06); }, // ブロック破壊
  zako:     () => { playSweep(330, 80, 0.18, 'sawtooth', 0.12); },
  bossHit:  () => { playTone(140, 0.08, 'sawtooth', 0.14); playNoise(0.05, 0.06, 800); },
  bossDef:  () => { playTone(900, 0.05, 'sine', 0.10); playTone(1300, 0.05, 'sine', 0.06); }, // 弾かれ
  bossWin:  () => {
    const notes = [523, 659, 784, 1046];
    notes.forEach((n, i) => setTimeout(() => playTone(n, 0.18, 'triangle', 0.14), i * 110));
  },
  item:     () => {
    [600, 800, 1000].forEach((n, i) => setTimeout(() => playTone(n, 0.08, 'sine', 0.12), i * 50));
  },
  clear:    () => {
    [659, 784, 1046].forEach((n, i) => setTimeout(() => playTone(n, 0.14, 'triangle', 0.13), i * 80));
  },
  gameOver: () => {
    [440, 349, 262].forEach((n, i) => setTimeout(() => playTone(n, 0.25, 'sawtooth', 0.12), i * 180));
  },
  empty:    () => { playTone(180, 0.15, 'sawtooth', 0.10); }, // 球切れ
};

// ============================================================
// BGM（季節別、自前合成、ループ再生）
// ============================================================
// 各曲は { bpm, loop:小節長(拍), tracks:[{type,vol,notes:[{t,n,d}]}] }
//   t = 拍数, n = MIDIノート番号, d = 拍数の長さ
function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

const BGM_SPRING = {
  bpm: 92, loop: 16,
  tracks: [
    { type: 'triangle', vol: 0.06, notes: [
      // ベース C-G-Am-F (Iの繰り返し)
      {t:0, n:48, d:2}, {t:2, n:55, d:2},
      {t:4, n:57, d:2}, {t:6, n:53, d:2},
      {t:8, n:48, d:2}, {t:10, n:55, d:2},
      {t:12, n:53, d:2}, {t:14, n:55, d:2},
    ]},
    { type: 'square', vol: 0.035, notes: [
      // のんびりメロディ
      {t:0, n:72, d:1}, {t:1, n:76, d:1}, {t:2, n:79, d:2},
      {t:4, n:81, d:1}, {t:5, n:79, d:1}, {t:6, n:76, d:2},
      {t:8, n:74, d:1}, {t:9, n:77, d:1}, {t:10, n:81, d:2},
      {t:12, n:79, d:1}, {t:13, n:76, d:1}, {t:14, n:72, d:2},
    ]},
  ],
};

const BGM_SUMMER = {
  bpm: 132, loop: 16,
  tracks: [
    { type: 'triangle', vol: 0.06, notes: [
      // 跳ねるベース
      {t:0, n:43, d:0.5}, {t:0.5, n:55, d:0.5}, {t:1, n:43, d:0.5}, {t:1.5, n:55, d:0.5},
      {t:2, n:43, d:0.5}, {t:2.5, n:55, d:0.5}, {t:3, n:43, d:0.5}, {t:3.5, n:55, d:0.5},
      {t:4, n:48, d:0.5}, {t:4.5, n:60, d:0.5}, {t:5, n:48, d:0.5}, {t:5.5, n:60, d:0.5},

let bgmGain = null;
let bgmCurrent = null;
let bgmNextScheduleAt = 0;
let bgmActiveOscs = [];

function ensureBgmGain() {
  if (!bgmGain && audioCtx) {
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0.6;
    bgmGain.connect(masterGain);
  }
}

function scheduleBgmIteration(bgm, startTime, beatDur) {
  for (const tr of bgm.tracks) {
    for (const note of tr.notes) {
      const t = startTime + note.t * beatDur;
      const dSec = note.d * beatDur;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = tr.type;
      osc.frequency.value = midiToFreq(note.n);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(tr.vol, t + 0.01);
      g.gain.setValueAtTime(tr.vol, t + Math.max(0.05, dSec * 0.7));
      g.gain.exponentialRampToValueAtTime(0.0001, t + Math.max(0.06, dSec));
      osc.connect(g).connect(bgmGain);
      osc.start(t);
      osc.stop(t + dSec + 0.1);
      bgmActiveOscs.push({ osc, end: t + dSec + 0.1 });
    }
  }
}

function startBgm(bgm) {
  if (!audioCtx || muted || !bgm) return;
  ensureBgmGain();
  if (bgmCurrent === bgm) return;
  stopBgm(0.15);
  // 短い遅延後に開始
  setTimeout(() => {
    if (!audioCtx || muted) return;
    ensureBgmGain();
    bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
    bgmGain.gain.setValueAtTime(0, audioCtx.currentTime);
    bgmGain.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 0.2);
    bgmCurrent = bgm;
    const beatDur = 60 / bgm.bpm;
    const start = audioCtx.currentTime + 0.05;
    scheduleBgmIteration(bgm, start, beatDur);
    bgmNextScheduleAt = start + bgm.loop * beatDur;
  }, 180);
}

function stopBgm(fade = 0.3) {
  if (!audioCtx || !bgmGain) { bgmCurrent = null; return; }
  const now = audioCtx.currentTime;
  bgmGain.gain.cancelScheduledValues(now);
  bgmGain.gain.setValueAtTime(bgmGain.gain.value, now);
  bgmGain.gain.exponentialRampToValueAtTime(0.0001, now + fade);
  // 旧BGMのオシレータだけスナップショットして停止
  // （新BGMが setTimeout 中に push されても巻き込まない）
  const toStop = bgmActiveOscs;
  bgmActiveOscs = [];
  setTimeout(() => {
    for (const o of toStop) { try { o.osc.stop(); } catch (e) {} }
  }, fade * 1000 + 100);
  bgmCurrent = null;
}

function updateBgm() {
  if (!bgmCurrent || !audioCtx) return;
  const now = audioCtx.currentTime;
  const beatDur = 60 / bgmCurrent.bpm;
  const loopSec = bgmCurrent.loop * beatDur;
  if (now > bgmNextScheduleAt - 0.5) {
    scheduleBgmIteration(bgmCurrent, bgmNextScheduleAt, beatDur);
    bgmNextScheduleAt += loopSec;
  }
  // 古い oscs クリーンアップ
  bgmActiveOscs = bgmActiveOscs.filter(o => o.end > now - 0.2);
}

function bgmForCurrentNode() {
  if (currentNodeIdx === BOSS_IDX) {
    return currentBossType() === 'silver' ? BGM_SILVER : BGM_GOLD;
  }
  // インデックス: 0春 / 1夏 / 2ボーナス / 3秋 / 4冬
  const NODE_BGM = [BGM_SPRING, BGM_SUMMER, BGM_BONUS, BGM_AUTUMN, BGM_WINTER];
  return NODE_BGM[Math.max(0, currentNodeIdx)];
}

// Resize / DPR (DTT パターン)
// ============================================================
let scale = 1, dpr = 1;
let canvasOffsetX = 0, canvasOffsetY = 0;
function fitCanvas() {
  const rect = wrap.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  // viewport のアスペクトに合わせて論理 W を伸縮（H は固定）
  const targetAspect = rect.width / rect.height;
  W = Math.max(W_MIN, Math.min(W_MAX, Math.round(H * targetAspect)));
  // フィットスケール（アスペクトが一致すれば余白なし）
  scale = Math.min(rect.width / W, rect.height / H);
  const cssW = W * scale;
  const cssH = H * scale;
  canvasOffsetX = (rect.width - cssW) / 2;
  canvasOffsetY = (rect.height - cssH) / 2;
  cv.style.width = cssW + 'px';
  cv.style.height = cssH + 'px';
  cv.style.position = 'absolute';
  cv.style.left = canvasOffsetX + 'px';
  cv.style.top = canvasOffsetY + 'px';
  cv.width = Math.round(cssW * dpr);
  cv.height = Math.round(cssH * dpr);
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  // W 変更時に画面外に出ないよう傘をクランプ（umbrella未定義時は無視）
  try {
    umbrella.x = clamp(umbrella.x, umbrella.halfW, W - umbrella.halfW);
  } catch (_) { /* TDZ: 初回 fitCanvas 時はまだ umbrella が無い */ }
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', fitCanvas);
fitCanvas();

function spawnBoss(type) {
  const c = BOSS_CONFIG[type];
  boss = {
    type,
    x: W * 0.7,
    y: H * 0.42,
    w: c.w,
    h: c.h,
    hp: c.hp,
    maxHp: c.hp,
    defending: false,
    modeTimer: 5 + Math.random() * 2, // 最初の防御まで
    bobPhase: 0,
    hitFlash: 0,
  };
}

function updateBoss(dt) {
  if (!boss) return;
  boss.bobPhase += dt * 1.2;
  // ふわふわ漂う
  boss.x = W * 0.65 + Math.sin(boss.bobPhase * 0.7) * 90;
  boss.y = H * 0.4 + Math.sin(boss.bobPhase * 1.3) * 25;
  if (boss.hitFlash > 0) boss.hitFlash -= dt * 4;

  // 防御モードのサイクル
  boss.modeTimer -= dt;
  if (boss.modeTimer <= 0) {
    if (boss.defending) {
      boss.defending = false;
      boss.modeTimer = 5 + Math.random() * 2.5; // 攻撃可能時間
    } else {
      boss.defending = true;
      boss.modeTimer = 2 + Math.random() * 1.0; // 防御時間
    }
  }
}

function spawnCoinRain(x, y, count) {
  for (let i = 0; i < count; i++) {
    coinRain.push({
      x: x + (Math.random() - 0.5) * 40,
      y: y + (Math.random() - 0.5) * 30,
      vx: (Math.random() - 0.5) * 280,
      vy: -240 - Math.random() * 200,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 8,
      age: 0,
      lifespan: 2.5 + Math.random() * 0.8,
    });
  }
}

function updateCoinRain(dt) {
  const G = 900; // 重力
  for (let i = coinRain.length - 1; i >= 0; i--) {
    const c = coinRain[i];
    c.x += c.vx * dt;
    c.y += c.vy * dt;
    c.vy += G * dt;
    c.rot += c.vrot * dt;
    c.age += dt;
    if (c.age > c.lifespan) coinRain.splice(i, 1);
  }
}

function drawCoin(c) {
  const fade = c.age > c.lifespan - 0.5
    ? Math.max(0, (c.lifespan - c.age) / 0.5) : 1;
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(c.rot);
  // 横方向のスクイーズで「回転して見える」効果
  const sq = Math.cos(c.rot * 1.5);
  ctx.scale(Math.max(0.2, Math.abs(sq)), 1);
  ctx.globalAlpha = fade;
  ctx.fillStyle = '#ffd86b';
  ctx.beginPath();
  ctx.arc(0, 0, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#a87a14';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#a87a14';
  ctx.font = 'bold 8px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', 0, 1);
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawBoss() {
  if (!boss) return;
  const c = BOSS_CONFIG[boss.type];
  const cx = boss.x;
  const cy = boss.y;
  const w = boss.w, h = boss.h;
  const isGold = boss.type === 'gold';

  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(cx + 4, cy + h / 2 + 8, w * 0.45, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // 本体
  ctx.fillStyle = c.color;
  ctx.beginPath();
  roundRectPath(cx - w / 2, cy - h / 2, w, h, 18);
  ctx.fill();
  // 縁取り
  ctx.strokeStyle = c.accent;
  ctx.lineWidth = 4;
  ctx.beginPath();
  roundRectPath(cx - w / 2, cy - h / 2, w, h, 18);
  ctx.stroke();

  // ヒットフラッシュ
  if (boss.hitFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${boss.hitFlash * 0.7})`;
    ctx.beginPath();
    roundRectPath(cx - w / 2, cy - h / 2, w, h, 18);
    ctx.fill();
  }

  // 飾り（金は王冠付き）
  if (isGold) {
    ctx.fillStyle = '#ffe680';
    ctx.beginPath();
    ctx.moveTo(cx - 26, cy - h / 2 - 4);
    ctx.lineTo(cx - 18, cy - h / 2 - 22);
    ctx.lineTo(cx - 10, cy - h / 2 - 8);
    ctx.lineTo(cx, cy - h / 2 - 26);
    ctx.lineTo(cx + 10, cy - h / 2 - 8);
    ctx.lineTo(cx + 18, cy - h / 2 - 22);
    ctx.lineTo(cx + 26, cy - h / 2 - 4);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#a87a14';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // 顔（防御中は怒り顔、通常時は穏やか）
  const eyeY = cy - 8;
  if (boss.defending) {
    // 防御中：本体に赤い怒りオーラ
    ctx.fillStyle = 'rgba(255,60,60,0.22)';
    ctx.beginPath();
    roundRectPath(cx - w / 2, cy - h / 2, w, h, 18);
    ctx.fill();

    // 怒り目（赤、斜めの三角形で吊り上がる）
    ctx.fillStyle = '#ff2a2a';
    // 左目
    ctx.beginPath();
    ctx.moveTo(cx - 38, eyeY - 8);
    ctx.lineTo(cx - 12, eyeY + 4);
    ctx.lineTo(cx - 38, eyeY + 6);
    ctx.closePath();
    ctx.fill();
    // 右目
    ctx.beginPath();
    ctx.moveTo(cx + 38, eyeY - 8);
    ctx.lineTo(cx + 12, eyeY + 4);
    ctx.lineTo(cx + 38, eyeY + 6);
    ctx.closePath();
    ctx.fill();
    // 黒い瞳（中央に）
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(cx - 22, eyeY + 1, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 22, eyeY + 1, 3.5, 0, Math.PI * 2); ctx.fill();

    // 怒りマーク（💢風の十字）
    const t = performance.now() / 1000;
    const am = 1 + Math.sin(t * 8) * 0.15;
    ctx.save();
    ctx.translate(cx + 38, cy - 32);
    ctx.scale(am, am);
    ctx.strokeStyle = '#ff2a2a';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    for (let i = 0; i < 4; i++) {
      ctx.save();
      ctx.rotate((i * Math.PI) / 4);
      ctx.beginPath();
      ctx.moveTo(0, -8);
      ctx.lineTo(0, -3);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();

    // 怒りの口（ギザギザ歯）
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.moveTo(cx - 22, cy + 18);
    for (let i = 0; i < 5; i++) {
      const x = cx - 22 + (i + 1) * (44 / 5);
      const y = cy + 18 + (i % 2 === 0 ? 8 : 0);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(cx + 22, cy + 18);
    ctx.closePath();
    ctx.fill();
    // 上下の白い歯
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 4; i++) {
      const tx = cx - 18 + i * 12;
      ctx.fillRect(tx, cy + 18, 6, 4);
      ctx.fillRect(tx, cy + 22, 6, 3);
    }
  } else {
    // 通常顔
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx - 24, eyeY, 14, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 24, eyeY, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(cx - 24, eyeY + 2, 7, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 24, eyeY + 2, 7, 0, Math.PI * 2); ctx.fill();
    // 笑顔
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(cx, cy + 22, 18, Math.PI * 0.15, Math.PI - Math.PI * 0.15);
    ctx.stroke();
  }

  // 防御シールド
  if (boss.defending) {
    const t = performance.now() / 1000;
    const r = Math.max(w, h) * 0.75;
    ctx.save();
    ctx.fillStyle = `rgba(120,200,255,${0.18 + Math.sin(t * 6) * 0.06})`;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `rgba(140,220,255,0.85)`;
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.lineDashOffset = -t * 30;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    // 「DEFENSE」文字
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('🛡 DEFENSE', cx, cy - r - 8);
  }

  // HPバー（画面上部）
  const barW = W * 0.6;
  const barH = 14;
  const bx = (W - barW) / 2;
  const by = 22;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(bx - 2, by - 2, barW + 4, barH + 4);
  ctx.fillStyle = '#444';
  ctx.fillRect(bx, by, barW, barH);
  const hpRatio = boss.hp / boss.maxHp;
  const grad = ctx.createLinearGradient(bx, 0, bx + barW, 0);
  if (isGold) {
    grad.addColorStop(0, '#ffd86b');
    grad.addColorStop(1, '#ff9c2a');
  } else {
    grad.addColorStop(0, '#e0e0e8');
    grad.addColorStop(1, '#888894');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(bx, by, barW * hpRatio, barH);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(bx, by, barW, barH);
  // ラベル
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${c.emoji} ${c.label}  ${boss.hp} / ${boss.maxHp}`, W / 2, by + barH / 2);
}
const ITEM_DROP_BLOCK = 0.006; // ブロックからのドロップ率（各面1個程度）
const ITEM_DROP_ZAKO  = 0.06;  // ザコからのドロップ率
const WIDE_DURATION   = 10;   // 秒
const WIDE_MULTIPLIER = 1.6;  // 傘の幅倍率
let wideTimer = 0;

// ブロック配置共通定数
const BW = 60, BH = 22, GAP = 4;
const START_Y = 60;
// 各季節のブロックパレット（行ごとに使い分け）。ボス＆ボーナスでは使われない
const SEASON_BLOCK_PALETTES = [
  ['#ffb7c5', '#ffc6d3', '#ff9aae', '#ffaac0', '#ffc1d1', '#ffb0c5', '#ffa3b9', '#ff97ae'], // 0 春
  ['#7cd1ff', '#a3deff', '#56b6e6', '#3d9bd1', '#5fb8e3', '#88c8e8', '#4ba8d4', '#6ec1e6'], // 1 夏
  ['#ffd86b', '#ffe06b', '#ffc94d', '#ffe89a', '#ffd86b', '#ffe06b', '#ffc94d', '#ffe89a'], // 2 ボーナス（プレースホルダー）
  ['#ff8a3a', '#ffa66b', '#e6671d', '#cc4f0a', '#ffb380', '#d96b1f', '#b85a17', '#ee7d2a'], // 3 秋
  ['#cae8ff', '#dfe9f5', '#aed0f0', '#92bce0', '#bcd9f0', '#9bc4e8', '#8eb6dc', '#a8c8e6'], // 4 冬
];

// ============================================================
// スクロール / ステージ進行
// ============================================================
const SCROLL_SPEED = 60; // px/sec
const STAGE_DURATION = 30; // sec
const BONUS_DURATION = 15; // sec（ボーナスは半分）
function currentStageLength() {
  const dur = isBonusNode(currentNodeIdx) ? BONUS_DURATION : STAGE_DURATION;
  return dur * SCROLL_SPEED;
}
const CHUNK_GAP = 90; // チャンク間の隙間
let stageProgress = 0; // 0..currentStageLength()
let nextChunkX = W + 40; // 次のチャンクの左端x（画面座標）
let stageNum = 0;       // 開始時に startStage() で1にインクリメント

// ============================================================
// ワールドマップ / 季節 / フェーズ
// ============================================================
const PHASE_PLAYING = 0;
const PHASE_CLEAR_BANNER = 1;
const PHASE_MAP_TRANSIT = 2;
const PHASE_MAP_WAIT = 3;       // マップで START ボタン待ち
let phase = PHASE_MAP_TRANSIT;  // 起動時はマップから開始
let phaseTimer = 0;

// 春-夏-ボーナス-秋-冬-ボス の 6 ノード構成。ボスは loopCount で銀/金が決まる。
const SEASONS = [
  { label: '春',       emoji: '🌸', color: '#ffb7c5', bg: ['#ffeef3', '#ffd9e3'] },
  { label: '夏',       emoji: '☀️', color: '#ffd86b', bg: ['#bff0ff', '#7cc6e8'] },
  { label: 'ボーナス', emoji: '💰', color: '#ffd86b', bg: ['#3a2a78', '#1a0e3a'] }, // 紫×金
  { label: '秋',       emoji: '🍁', color: '#ff8a3a', bg: ['#ffe0c0', '#ff9966'] },
  { label: '冬',       emoji: '❄️', color: '#cae8ff', bg: ['#eaf5ff', '#aac8e0'] },
];
const BOSS_NODE = {
  silver: { label: '銀ボス', emoji: '🥈', color: '#cccccc', bg: ['#5a5a6a', '#2a2a35'] },
  gold:   { label: '金ボス', emoji: '🥇', color: '#ffd86b', bg: ['#5a4500', '#2a1f00'] },
};
const TOTAL_NODES = 6;
const BOSS_IDX = 5;
const BONUS_IDX = 2;
let loopCount = 1;        // 1巡目=銀, 2巡目=金, 3巡目=銀...
let currentNodeIdx = -1;  // 起動時はマップ外
let nextNodeIdx = 0;
let walkProgress = 0; // 0..1
const BANNER_DURATION = 1.6;
const WALK_DURATION = 1.8;
phaseTimer = WALK_DURATION;  // 初回マップ進入アニメーションを始動

function currentBossType() {
  return loopCount % 2 === 1 ? 'silver' : 'gold';
}
function nodeAt(idx) {
  if (idx < 0) return SEASONS[0];
  if (idx === BOSS_IDX) return BOSS_NODE[currentBossType()];
  return SEASONS[idx];
}

function getNodePos(idx) {
  // idx = -1 はマップ外の左端（初回登場用）
  if (idx < 0) {
    const first = getNodePos(0);
    return { x: -60, y: first.y };
  }
  // 上下に振った横並び配置
  const margin = 90;
  const usable = W - margin * 2;
  const x = margin + idx * (usable / (TOTAL_NODES - 1));
  const y = H / 2 + (idx % 2 === 0 ? -55 : 55);
  return { x, y };
}

function pushBlock(col, row, baseX) {
  blocks.push({
    x: baseX + col * (BW + GAP) + BW / 2,
    y: START_Y + row * (BH + GAP) + BH / 2,
    w: BW,
    h: BH,
    hp: 1,
    maxHp: 1,
    color: SEASON_BLOCK_PALETTES[Math.max(0, currentNodeIdx)][row % SEASON_BLOCK_PALETTES[0].length],
    hitFlash: 0,
  });
}

function pushZako(col, row, baseX) {
  zakos.push({
    x: baseX + col * (BW + GAP) + BW / 2,
    y: START_Y + row * (BH + GAP) + BH / 2,
    w: BW * 0.95,
    h: BH * 1.4,
    hp: 3,
    maxHp: 3,
    hitFlash: 0,
    bobPhase: Math.random() * Math.PI * 2,
  });
}

// ----- チャンク群（baseX = チャンクの左端x、戻り値 = チャンク幅）-----
function chunkWidth(cols) { return cols * (BW + GAP) - GAP; }

function chunkBands(baseX) {
  const cols = 8;
  for (const r of [0, 1, 6, 7]) {
    for (let c = 0; c < cols; c++) pushBlock(c, r, baseX);
  }
  return chunkWidth(cols);
}

function chunkStairsDown(baseX) {
  const cols = 8;
  for (let c = 0; c < cols; c++) {
    const base = Math.floor(c * 0.85);
    pushBlock(c, base, baseX);
    pushBlock(c, base + 1, baseX);
  }
  return chunkWidth(cols);
}

function chunkStairsUp(baseX) {
  const cols = 8;
  for (let c = 0; c < cols; c++) {
    const base = Math.floor((cols - 1 - c) * 0.85);
    pushBlock(c, base, baseX);
    pushBlock(c, base + 1, baseX);
  }
  return chunkWidth(cols);
}

function chunkScatter(baseX) {
  const cols = 7;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() < 0.5) pushBlock(c, r, baseX);
    }
  }
  if (Math.random() < 0.4) {
    pushZako(Math.floor(Math.random() * cols), Math.floor(Math.random() * 7), baseX);
  }
  return chunkWidth(cols);
}

function chunkArch(baseX) {
  const cols = 8;
  for (let c = 0; c < cols; c++) {
    const center = (cols - 1) / 2;
    const dist = Math.abs(c - center);
    const base = Math.floor(7 - dist * 1.0);
    pushBlock(c, base, baseX);
    if (base > 0) pushBlock(c, base - 1, baseX);
  }
  return chunkWidth(cols);
}

function chunkPillars(baseX) {
  const cols = 8;
  for (let c = 0; c < cols; c++) {
    if (c % 2 === 0) {
      for (let r = 1; r < 7; r++) pushBlock(c, r, baseX);
    }
  }
  return chunkWidth(cols);
}

function chunkZakoFort(baseX) {
  // ブロックの壁の中にザコ
  const cols = 6;
  for (let r of [0, 5]) {
    for (let c = 0; c < cols; c++) pushBlock(c, r, baseX);
  }
  for (let r of [1, 2, 3, 4]) {
    pushBlock(0, r, baseX);
    pushBlock(cols - 1, r, baseX);
  }
  pushZako(2, 2, baseX);
  pushZako(3, 3, baseX);
  return chunkWidth(cols);
}

function chunkZakoLine(baseX) {
  // ザコが横一列、上下にブロックの天井床
  const cols = 6;
  for (let c = 0; c < cols; c++) {
    pushBlock(c, 0, baseX);
    pushBlock(c, 7, baseX);
  }
  for (let c = 1; c < cols - 1; c += 2) {
    pushZako(c, 3, baseX);
  }
  return chunkWidth(cols);
}

function chunkBandsGap(baseX) {
  // 上下バンドだが片側だけ抜けてる
  const cols = 8;
  const topGap = Math.floor(Math.random() * cols);
  const botGap = Math.floor(Math.random() * cols);
  for (let c = 0; c < cols; c++) {
    if (c !== topGap) pushBlock(c, 0, baseX);
    if (c !== topGap) pushBlock(c, 1, baseX);
    if (c !== botGap) pushBlock(c, 6, baseX);
    if (c !== botGap) pushBlock(c, 7, baseX);
  }
  return chunkWidth(cols);
}

const CHUNKS = [
  chunkBands, chunkStairsDown, chunkStairsUp,
  chunkScatter, chunkArch, chunkPillars,
  chunkZakoFort, chunkZakoLine, chunkBandsGap,
];

// ----- ボーナス面用：コイン敷き詰めチャンク -----
const COIN_W = 32, COIN_H = 26, COIN_GAP = 2;
function chunkCoinDense(baseX) {
  const cols = 14, rows = 9;
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows; r++) {
      blocks.push({
        x: baseX + c * (COIN_W + COIN_GAP) + COIN_W / 2,
        y: START_Y + r * (COIN_H + COIN_GAP) + COIN_H / 2,
        w: COIN_W,
        h: COIN_H,
        hp: 1,
        maxHp: 1,
        color: '#ffd86b',
        hitFlash: 0,
        bonus: true,
      });
    }
  }
  return cols * (COIN_W + COIN_GAP) - COIN_GAP;
}

function spawnNextChunk() {
  if (isBonusNode(currentNodeIdx)) {
    const w = chunkCoinDense(nextChunkX);
    nextChunkX += w + 12; // 隙間も狭く
    return;
  }
  const fn = CHUNKS[Math.floor(Math.random() * CHUNKS.length)];
  const w = fn(nextChunkX);
  nextChunkX += w + CHUNK_GAP;
}

function resetStage() {
  blocks.length = 0;
  zakos.length = 0;
  balls.length = 0;
  items.length = 0;
  particles.length = 0;
  coinRain.length = 0;
  particleSpawnTimer = 0;
  stageProgress = 0;
  nextChunkX = W;
  boss = null;
  bossClearWait = 0;
  // ボスステージなら通常スクロールを止めてボスを召喚
  if (isBossNode(currentNodeIdx)) {
    spawnBoss(currentBossType());
  }
}
resetStage();

// ----- 季節パーティクル -----
// idx: 0春 / 1夏 / 2ボーナス / 3秋 / 4冬 / 5ボス
const PARTICLE_INTERVAL = [0.22, 0.45, 0.10, 0.28, 0.16, 0.30];

function spawnSeasonParticle(idx) {
  const x = -20 + Math.random() * (W + 40);
  const y = -10;
  let p = null;
  if (idx === 0) {        // 春 桜
    p = { x, y, vx: -8 - Math.random() * 6, vy: 25 + Math.random() * 25,
          rot: Math.random() * Math.PI * 2, vrot: 0.8 + Math.random() * 0.8,
          type: 'sakura', age: 0, lifespan: 22 };
  } else if (idx === 1) { // 夏 光粒
    p = { x, y, vx: -5, vy: 50 + Math.random() * 25,
          rot: 0, vrot: 0,
          type: 'sun', age: 0, lifespan: 12 };
  } else if (idx === 2) { // ボーナス 金キラ星
    p = { x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 40, vy: (Math.random() - 0.5) * 40,
          rot: Math.random() * Math.PI * 2, vrot: 4 + Math.random() * 4,
          type: 'coinSparkle', age: 0, lifespan: 1.6 };
  } else if (idx === 3) { // 秋 紅葉
    p = { x, y, vx: -12 - Math.random() * 8, vy: 40 + Math.random() * 30,
          rot: Math.random() * Math.PI * 2, vrot: 1.5 + Math.random() * 2,
          type: 'leaf', age: 0, lifespan: 18 };
  } else if (idx === 4) { // 冬 雪
    p = { x, y, vx: -3 + Math.random() * 6, vy: 25 + Math.random() * 35,
          rot: 0, vrot: 0,
          type: 'snow', age: 0, lifespan: 22 };
  } else if (idx === 5) { // ボス 火花（銀/金）
    p = { x: W * 0.5 + (Math.random() - 0.5) * 200,
          y: H * 0.4,
          vx: (Math.random() - 0.5) * 80, vy: 50 + Math.random() * 80,
          rot: 0, vrot: 0,
          type: currentBossType() === 'silver' ? 'sparkSilver' : 'sparkGold',
          age: 0, lifespan: 4 };
  }
  if (p) particles.push(p);
}

function updateParticles(dt) {
  if (phase === PHASE_MAP_TRANSIT || phase === PHASE_MAP_WAIT) return; // マップ中は雰囲気の更新を止める
  const idx = Math.max(0, currentNodeIdx);
  particleSpawnTimer -= dt;
  while (particleSpawnTimer <= 0) {
    particleSpawnTimer += PARTICLE_INTERVAL[idx];
    spawnSeasonParticle(idx);
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.rot += p.vrot * dt;
    p.age += dt;
    if (p.age > p.lifespan || p.y > H + 30 || p.x < -40) particles.splice(i, 1);
  }
}

function drawParticle(p) {
  const fade = p.age > p.lifespan - 1.5
    ? Math.max(0, (p.lifespan - p.age) / 1.5) : 1;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  ctx.globalAlpha = fade;
  if (p.type === 'sakura') {
    ctx.fillStyle = '#ffc8d8';
    ctx.beginPath();
    ctx.ellipse(0, 0, 5, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.type === 'sun') {
    ctx.fillStyle = 'rgba(255,240,150,0.7)';
    ctx.fillRect(-1, -10, 2, 20);
  } else if (p.type === 'leaf') {
    ctx.fillStyle = ['#d44515', '#e6671d', '#ffa040'][Math.floor(p.age * 3) % 3];
    ctx.beginPath();
    ctx.ellipse(0, 0, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.type === 'snow') {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.type === 'sparkSilver') {
    ctx.fillStyle = '#e8e8e8';
    ctx.beginPath();
    ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.type === 'sparkGold') {
    ctx.fillStyle = '#ffd86b';
    ctx.beginPath();
    ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.type === 'coinSparkle') {
    // 金色のキラ星（4方向の十字＋中心の点）
    ctx.fillStyle = '#fff7c0';
    ctx.beginPath();
    ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ffd86b';
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-4, 0); ctx.lineTo(4, 0);
    ctx.moveTo(0, -4); ctx.lineTo(0, 4);
    ctx.stroke();
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function maybeDropItem(x, y, rate) {
  if (Math.random() < rate) {
    items.push({
      x, y,
      type: Math.random() < 0.5 ? 'wide' : 'multi',
      bobPhase: 0,
    });
  }
}

function applyItem(type, ball) {
  if (type === 'wide') {
    wideTimer = Math.max(wideTimer, 0) + WIDE_DURATION;
    showMsg(`🌂 WIDE +${WIDE_DURATION}s`);
  } else if (type === 'multi') {
    const speed = Math.hypot(ball.vx, ball.vy) || BALL_SPEED;
    const baseAngle = Math.atan2(ball.vy, ball.vx);
    for (const da of [-0.35, 0.35]) {
      const a = baseAngle + da;
      balls.push({
        x: ball.x, y: ball.y,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed,
        r: BALL_R,
        combo: ball.combo,
      });
    }
    showMsg('⚪ MULTI BALL!');
  }
}

// ============================================================
// 入力
// ============================================================
function pointerToWorld(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  return {
    x: (clientX - rect.left) / scale,
    y: (clientY - rect.top) / scale,
  };
}

cv.addEventListener('mousemove', (e) => {
  const p = pointerToWorld(e.clientX, e.clientY);
  umbrella.x = clamp(p.x, umbrella.halfW, W - umbrella.halfW);
});

cv.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  const p = pointerToWorld(e.clientX, e.clientY);
  handleTap(p.x, p.y);
});

// 共通タップ処理：マップ待機中はSTARTボタン、プレイ中は発射
function handleTap(x, y) {
  if (phase === PHASE_MAP_WAIT) {
    if (isInStartButton(x, y)) startStage();
    return;
  }
  launchBall();
}

// ----- タッチ操作（タブレット/スマホ） -----
// ストリップ起点のドラッグ=傘移動、タップ=発射（指で傘が隠れない設計）
let touchStartX = null, touchStartY = null, touchMoved = false, activeTouchId = null;
let touchStartClientX = null, touchStartClientY = null;
const TAP_THRESHOLD_CSS = 16; // CSS pixels（端末解像度に依存しない）

cv.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (activeTouchId !== null) return; // 既に操作中の指がある
  const t = e.changedTouches[0];
  activeTouchId = t.identifier;
  const p = pointerToWorld(t.clientX, t.clientY);
  touchStartX = p.x;
  touchStartY = p.y;
  touchStartClientX = t.clientX;
  touchStartClientY = t.clientY;
  touchMoved = false;
  // 画面どこでも傘が指のX位置に追従
  umbrella.x = clamp(p.x, umbrella.halfW, W - umbrella.halfW);
}, { passive: false });

cv.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== activeTouchId) continue;
    const p = pointerToWorld(t.clientX, t.clientY);
    const dxCss = t.clientX - touchStartClientX;
    const dyCss = t.clientY - touchStartClientY;
    if (Math.hypot(dxCss, dyCss) > TAP_THRESHOLD_CSS) {
      touchMoved = true;
    }
    umbrella.x = clamp(p.x, umbrella.halfW, W - umbrella.halfW);
  }
}, { passive: false });

function endTouch(e) {
  e.preventDefault();
  let endedTouch = null;
  for (const t of e.changedTouches) {
    if (t.identifier === activeTouchId) { endedTouch = t; break; }
  }
  if (!endedTouch) return;
  if (!touchMoved) {
    handleTap(touchStartX, touchStartY);
  } else {
    // ドラッグ扱いになっていても、終端位置がSTARTボタン圏内なら救済
    const p = pointerToWorld(endedTouch.clientX, endedTouch.clientY);
    if (phase === PHASE_MAP_WAIT && isInStartButton(p.x, p.y)) {
      startStage();
    }
  }
  activeTouchId = null;
  touchStartX = null;
  touchStartY = null;
  touchStartClientX = null;
  touchStartClientY = null;
  touchMoved = false;
}
cv.addEventListener('touchend', endTouch, { passive: false });
cv.addEventListener('touchcancel', endTouch, { passive: false });

// 二本指ピンチ等の誤操作抑止（document全体）
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('gesturechange', (e) => e.preventDefault());
document.addEventListener('gestureend', (e) => e.preventDefault());
// 長押しコンテキストメニュー抑止
cv.addEventListener('contextmenu', (e) => e.preventDefault());

// ----- 横画面ロック試行（対応端末のみ、ユーザー操作起点で1回） -----
let orientationLockTried = false;
async function tryLockLandscape() {
  if (orientationLockTried) return;
  orientationLockTried = true;
  try {
    // フルスクリーン化（一部のブラウザで lock 前提）
    const el = document.documentElement;
    if (el.requestFullscreen) await el.requestFullscreen().catch(() => {});
    if (screen.orientation && screen.orientation.lock) {
      await screen.orientation.lock('landscape').catch(() => {});
    }
  } catch (_) {
    // iOS Safari など未対応端末では何もしない（CSSオーバーレイで誘導）
  }
}
// 横画面ロックはタイトル後の最初の START タップで試行（始めるボタンを邪魔しないため）
// ダブルタップズーム抑止は CSS の touch-action: manipulation で済ませる
// プルリフレッシュ等のオーバースクロール抑止
document.addEventListener('touchmove', (e) => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (phase === PHASE_MAP_WAIT) startStage();
    else launchBall();
  } else if (e.code === 'KeyR') {
    // デバッグ用: ステージリセット＋球補充
    resetStage();
    ballStock += 10;
    showMsg('リセット 🎱+10');
    updateUI();
  }
});

function startStage() {
  if (phase !== PHASE_MAP_WAIT) return;
  ensureAudio();
  tryLockLandscape(); // 初回プレイ開始時に横画面ロック試行
  stageNum++;
  resetStage();
  phase = PHASE_PLAYING;
  startBgm(bgmForCurrentNode());
}

function launchBall() {
  if (phase !== PHASE_PLAYING) return; // クリア演出中は発射不可
  if (paused) return;
  ensureAudio();
  if (ballStock <= 0) {
    SE.empty();
    showContinuePopup();
    return;
  }
  ballStock--;
  SE.launch();
  updateUI();
  // 傘の真上から、ほぼ真上方向（±10°ランダム）に発射
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.35;
  balls.push({
    x: umbrella.x,
    y: umbrella.y - umbrella.halfW - BALL_R - 2, // ドーム頂点の少し上から発射
    vx: Math.cos(angle) * BALL_SPEED,
    vy: Math.sin(angle) * BALL_SPEED,
    r: BALL_R,
    combo: 0,
  });
}

  unlockedSkins.push(nextId);

}

function getHiscores() {

function recordHiscore(c, s, l) {
  const list = getHiscores();
  const rec = { c, s, l, d: new Date().toISOString().slice(0, 10) };
  list.push(rec);
  list.sort((a, b) => b.c - a.c);
  list.length = Math.min(list.length, 5);
  try { localStorage.setItem(HISCORE_KEY, JSON.stringify(list)); } catch (e) {}
  return list.indexOf(rec); // -1 ならランクイン外
}

function drawSkinPreview(canvas, skin) {
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h - 4;
  const R = Math.min(w * 0.4, h * 0.7);
  c.clearRect(0, 0, w, h);
  // ドーム塗り（クリップ）
  c.save();
  c.beginPath();
  c.moveTo(cx - R, cy);
  c.arc(cx, cy, R, Math.PI, 0, false);
  c.closePath();
  c.clip();
  if (skin.pattern === 'stripes') {
    const ns = 8, sw = (R * 2) / ns;
    for (let i = 0; i < ns; i++) {
      c.fillStyle = i % 2 === 0 ? skin.dome : skin.frame;
      c.fillRect(cx - R + i * sw, cy - R, sw, R);
    }
  } else if (skin.pattern === 'dots') {
    c.fillStyle = skin.dome;
    c.fillRect(cx - R, cy - R, R * 2, R);
    c.fillStyle = skin.dotColor;
    for (let dy = cy - R + 4; dy < cy; dy += 6) {
      for (let dx = cx - R + 4; dx < cx + R; dx += 6) {
        c.beginPath(); c.arc(dx, dy, 1.2, 0, Math.PI * 2); c.fill();
      }
    }
  } else if (skin.pattern === 'gradient') {
    const g = c.createLinearGradient(cx - R, 0, cx + R, 0);
    g.addColorStop(0, '#ff3a3a'); g.addColorStop(0.33, '#ffd86b');
    g.addColorStop(0.66, '#3aa0ff'); g.addColorStop(1, '#ff3aaa');
    c.fillStyle = g;
    c.fillRect(cx - R, cy - R, R * 2, R);
  } else {
    c.fillStyle = skin.dome;
    c.fillRect(cx - R, cy - R, R * 2, R);
  }
  c.restore();
  // 縁
  c.strokeStyle = skin.frame;
  c.lineWidth = 1.5;
  c.beginPath();
  c.arc(cx, cy, R, Math.PI, 0, false);
  c.stroke();
}

function renderSkinGrid() {
  const grid = document.getElementById('skin-grid');
  const nameEl = document.getElementById('skin-name');
  grid.innerHTML = '';
  SKINS.forEach((skin, i) => {
    const item = document.createElement('button');
    item.className = 'skin-item';
    if (selectedSkinId === i) item.classList.add('selected');
    const unlocked = unlockedSkins.includes(i);
    if (!unlocked) {
      item.classList.add('locked');
      item.textContent = '🔒';
    } else {
      const cv = document.createElement('canvas');
      cv.width = 40; cv.height = 26;
      cv.style.maxWidth = '90%';
      cv.style.maxHeight = '90%';
      item.appendChild(cv);
      drawSkinPreview(cv, skin);
    }
    bindButton(item, () => {
      if (!unlockedSkins.includes(i)) return;
      selectSkin(i);

}

// ============================================================
// 物理 / 衝突
// ============================================================
function update(dt) {
  // ポップアップ表示中は全更新を停止
  if (paused) return;

  // ----- 季節パーティクル -----
  updateParticles(dt);

  // ----- フェーズ別の進行管理 -----
  if (phase === PHASE_PLAYING) {
    updateCoinRain(dt);

    if (isBossNode(currentNodeIdx)) {
      // ボスステージ：スクロールなし、チャンクなし、ボス撃破後も非スクロール
      if (boss) updateBoss(dt);
      if (bossClearWait > 0) {
        bossClearWait -= dt;
        if (bossClearWait <= 0) {
          phase = PHASE_CLEAR_BANNER;
          phaseTimer = BANNER_DURATION;
        }
      }
    } else {
      const scroll = SCROLL_SPEED * dt;
      if (stageProgress < currentStageLength()) {
        stageProgress += scroll;
        if (stageProgress > currentStageLength()) stageProgress = currentStageLength();
      }
      for (const b of blocks) b.x -= scroll;
      for (const z of zakos) z.x -= scroll;
      for (const it of items) { it.x -= scroll; it.bobPhase += dt * 4; }
      nextChunkX -= scroll;

      if (stageProgress < currentStageLength() && nextChunkX < W) {
        spawnNextChunk();
      }

      for (let i = blocks.length - 1; i >= 0; i--) {
        if (blocks[i].x + blocks[i].w / 2 < -10) blocks.splice(i, 1);
      }
      for (let i = zakos.length - 1; i >= 0; i--) {
        if (zakos[i].x + zakos[i].w / 2 < -10) zakos.splice(i, 1);
      }
      for (let i = items.length - 1; i >= 0; i--) {
        if (items[i].x < -ITEM_R) items.splice(i, 1);
      }

      // ステージクリア判定 → クリアバナー
      if (stageProgress >= currentStageLength() && blocks.length === 0 && zakos.length === 0) {
        const reward = isBonusNode(currentNodeIdx) ? 100 : 30;
        coins += reward;
        phase = PHASE_CLEAR_BANNER;
        phaseTimer = BANNER_DURATION;
        SE.clear();
        stopBgm(0.4);
        const newSkin = maybeUnlockNextSkin();
        if (newSkin !== null) showMsg(`🌂 新スキン「${SKINS[newSkin].name}」ゲット!`);
      }
    }

    // アクティブ効果のタイマー減算（プレイ中のみ）
    if (wideTimer > 0) wideTimer = Math.max(0, wideTimer - dt);
    umbrella.halfW = wideTimer > 0
      ? umbrella.baseHalfW * WIDE_MULTIPLIER
      : umbrella.baseHalfW;
  } else if (phase === PHASE_CLEAR_BANNER) {
    phaseTimer -= dt;
    if (phaseTimer <= 0) {
      // 次ノードを決定。ボスをクリアした時はループカウントを進める
      if (currentNodeIdx === BOSS_IDX) loopCount++;
      nextNodeIdx = (currentNodeIdx + 1) % TOTAL_NODES;
      walkProgress = 0;
      phase = PHASE_MAP_TRANSIT;
      phaseTimer = WALK_DURATION;
    }
  } else if (phase === PHASE_MAP_TRANSIT) {
    phaseTimer -= dt;
    walkProgress = clamp(1 - phaseTimer / WALK_DURATION, 0, 1);
    if (phaseTimer <= 0) {
      currentNodeIdx = nextNodeIdx;
      phase = PHASE_MAP_WAIT;
      saveGame(); // 各ステージ開始前のセーブポイント
    }
  } else if (phase === PHASE_MAP_WAIT) {
    // STARTボタン待ち（タップで startStage()）
  }

  // ----- ザコのアニメーション位相更新 -----
  for (const z of zakos) {
    z.bobPhase += dt * 3;
    if (z.hitFlash > 0) z.hitFlash -= dt * 4;
  }
  for (const blk of blocks) {
    if (blk.hitFlash > 0) blk.hitFlash -= dt * 4;
  }

  // ----- ボール更新 -----
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    // 壁（左右上）
    if (b.x - b.r < 0) { b.x = b.r; b.vx = -b.vx; }
    if (b.x + b.r > W) { b.x = W - b.r; b.vx = -b.vx; }
    if (b.y - b.r < 0) { b.y = b.r; b.vy = -b.vy; }

    // 下から消滅
    if (b.y - b.r > H) {
      balls.splice(i, 1);
      continue;
    }

    // 傘（ドーム＝上半円のみ反射面、持ち手や下半分は素通り）
    if (b.vy > 0) {
      const ux = umbrella.x;
      const uy = umbrella.y;
      const R = umbrella.halfW;
      const dx = b.x - ux;
      const dy = b.y - uy;
      if (dy <= b.r * 0.6) {
        const distSq = dx * dx + dy * dy;
        const reach = R + b.r;
        if (distSq <= reach * reach) {
          const safeDy = Math.min(dy, -0.001);
          const safeDist = Math.hypot(dx, safeDy) || reach;
          const nx = dx / safeDist;
          const ny = safeDy / safeDist;
          b.x = ux + nx * reach;
          b.y = uy + ny * reach;
          const offset = clamp(dx / R, -1, 1);
          const angle = -Math.PI / 2 + offset * (Math.PI / 3);
          b.vx = Math.cos(angle) * BALL_SPEED;
          b.vy = Math.sin(angle) * BALL_SPEED;
          b.combo = 0;
          SE.bounce();
        }
      }
    }

    // アイテム衝突（球は跳ね返らず通過、効果発動）
    for (let j = items.length - 1; j >= 0; j--) {
      const it = items[j];
      const dx = b.x - it.x;
      const dy = b.y - it.y;
      const reach = ITEM_R + b.r;
      if (dx * dx + dy * dy < reach * reach) {
        items.splice(j, 1);
        applyItem(it.type, b);
        SE.item();
      }
    }

    // ブロック衝突
    let hit = false;
    for (let j = blocks.length - 1; j >= 0; j--) {
      const blk = blocks[j];
      if (collideBallBox(b, blk)) {
        blk.hp--;
        blk.hitFlash = 1;
        if (blk.hp <= 0) {
          // ボーナスタイルはアイテム無し、報酬2倍ベース、コイン音
          if (!blk.bonus) maybeDropItem(blk.x, blk.y, ITEM_DROP_BLOCK);
          blocks.splice(j, 1);
          b.combo++;
          const base = blk.bonus ? 2 : 1;
          const gain = comboReward(base, b.combo);
          coins += gain;
          score += gain;
          if (b.combo > comboBest) comboBest = b.combo;
          if (b.combo >= 3) showMsg(`${b.combo} COMBO! +${gain}`);
          if (blk.bonus) SE.item(); else SE.break();
        } else {
          SE.hit();
        }
        hit = true;
        break;
      }
    }
    if (hit) continue;

    // ザコ衝突
    for (let j = zakos.length - 1; j >= 0; j--) {
      const z = zakos[j];
      if (collideBallBox(b, z)) {
        z.hp--;
        z.hitFlash = 1;
        if (z.hp <= 0) {
          maybeDropItem(z.x, z.y, ITEM_DROP_ZAKO);
          zakos.splice(j, 1);
          b.combo++;
          const gain = comboReward(5, b.combo);
          coins += gain;
          score += gain;
          if (b.combo > comboBest) comboBest = b.combo;
          showMsg(`ザコ撃破! +${gain}${b.combo >= 3 ? ` (${b.combo} COMBO)` : ''}`);
          SE.zako();
        } else {
          SE.hit();
        }
        break;
      }
    }

    // ボス衝突
    if (boss && bossClearWait <= 0) {
      if (collideBallBox(b, boss)) {
        if (boss.defending) {
          // 防御中はノーダメ（球は跳ね返る）
          boss.hitFlash = Math.max(boss.hitFlash, 0.3);
          SE.bossDef();
        } else {
          boss.hp--;
          boss.hitFlash = 1;
          b.combo++;
          if (b.combo > comboBest) comboBest = b.combo;
          if (boss.hp <= 0) {
            const c = BOSS_CONFIG[boss.type];
            coins += c.reward;
            score += c.reward;
            spawnCoinRain(boss.x, boss.y, boss.type === 'silver' ? 35 : 70);
            showMsg(`${c.emoji} ${c.label} 撃破! +${c.reward}`);
            bossClearWait = 0.6;
            boss = null;
            SE.bossWin();
            stopBgm(0.5);
            const newSkin = maybeUnlockNextSkin();
            if (newSkin !== null) {
              setTimeout(() => showMsg(`🌂 新スキン「${SKINS[newSkin].name}」ゲット!`), 1200);
            }
          } else {
            SE.bossHit();
          }
        }
      }
    }
  }

  updateUI();
}

// コンボ報酬: コンボ数倍率（combo 1=×1, 2=×2, 3=×3, ...）
function comboReward(base, combo) {
  return base * Math.max(1, combo);
}

function collideBallBox(b, blk) {
  const left = blk.x - blk.w / 2;
  const right = blk.x + blk.w / 2;
  const top = blk.y - blk.h / 2;
  const bottom = blk.y + blk.h / 2;

  // 球中心がブロック内部にめり込んだケース
  if (b.x > left && b.x < right && b.y > top && b.y < bottom) {
    const overlapL = b.x - left;
    const overlapR = right - b.x;
    const overlapT = b.y - top;
    const overlapB = bottom - b.y;
    const minH = Math.min(overlapL, overlapR);
    const minV = Math.min(overlapT, overlapB);
    if (minH < minV) {
      if (overlapL < overlapR) b.x = left - b.r;
      else b.x = right + b.r;
      b.vx = -b.vx;
    } else {
      if (overlapT < overlapB) b.y = top - b.r;
      else b.y = bottom + b.r;
      b.vy = -b.vy;
    }
    return true;
  }

  // 通常: ブロック表面の最近接点で円との接触判定
  const cx = clamp(b.x, left, right);
  const cy = clamp(b.y, top, bottom);
  const dx = b.x - cx;
  const dy = b.y - cy;
  const distSq = dx * dx + dy * dy;
  if (distSq > b.r * b.r) return false;

  const dist = Math.sqrt(distSq) || 0.0001;
  const nx = dx / dist;
  const ny = dy / dist;
  const overlap = b.r - dist;
  b.x += nx * overlap;
  b.y += ny * overlap;
  const vDotN = b.vx * nx + b.vy * ny;
  b.vx -= 2 * vDotN * nx;
  b.vy -= 2 * vDotN * ny;
  return true;
}

// ============================================================
// 描画
// ============================================================
function draw() {
  // 季節別の背景（マップ外なら次のノードの色を先取り）
  const bgIdx = currentNodeIdx < 0 ? nextNodeIdx : currentNodeIdx;
  const node = nodeAt(bgIdx);
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, node.bg[0]);
  g.addColorStop(1, node.bg[1]);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // 季節パーティクル（背景の上、ブロックの下）
  for (const p of particles) drawParticle(p);

  // ブロック / コインタイル
  for (const blk of blocks) {
    if (blk.bonus) {
      // コイン（金色の円）
      const cx = blk.x, cy = blk.y;
      const r = Math.min(blk.w, blk.h) / 2 - 1;
      // 内側の明るい色
      const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.2, cx, cy, r);
      grad.addColorStop(0, '#fff7c0');
      grad.addColorStop(0.5, '#ffd86b');
      grad.addColorStop(1, '#c19926');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      // 縁
      ctx.strokeStyle = '#a87a14';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // $ 記号
      ctx.fillStyle = '#7a5510';
      ctx.font = 'bold 13px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('$', cx, cy + 1);
      // ヒットフラッシュ
      if (blk.hitFlash > 0) {
        ctx.fillStyle = `rgba(255,255,255,${blk.hitFlash * 0.7})`;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
      }
      continue;
    }
    const x = blk.x - blk.w / 2;
    const y = blk.y - blk.h / 2;
    ctx.fillStyle = blk.color;
    ctx.fillRect(x, y, blk.w, blk.h);
    if (blk.hitFlash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${blk.hitFlash * 0.6})`;
      ctx.fillRect(x, y, blk.w, blk.h);
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, blk.w - 1, blk.h - 1);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(x + 2, y + 2, blk.w - 4, 3);
  }

  // ザコ
  for (const z of zakos) drawZako(z);

  // ボス
  drawBoss();

  // アイテム
  for (const it of items) drawItem(it);

  // 傘
  drawUmbrella(umbrella.x, umbrella.y);

  // ボス戦中はステージ進行バーを隠す（ボスHPバーで代替）
  if (!boss && !isBossNode(currentNodeIdx)) drawStageBar();

  // コインレイン（ボス撃破時の演出）
  for (const c of coinRain) drawCoin(c);

  // アクティブ効果インジケータ
  drawActiveEffects();

  // ボール（輝く銀色のメタリック仕上げ。冬の白背景でも視認できるよう外周にグロー）
  for (const b of balls) {
    // グロー（外側のぼやけ）
    ctx.fillStyle = 'rgba(180,210,255,0.45)';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r + 4, 0, Math.PI * 2);
    ctx.fill();
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.arc(b.x + 1, b.y + 2, b.r, 0, Math.PI * 2);
    ctx.fill();
    // 本体（銀色グラデ：上が明るく下が暗い）
    const grad = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.4, b.r * 0.2, b.x, b.y, b.r);
    grad.addColorStop(0,    '#ffffff');
    grad.addColorStop(0.35, '#e6ecf5');
    grad.addColorStop(0.7,  '#aab4c2');
    grad.addColorStop(1,    '#5a6577');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    // 輪郭（暗めのリング）
    ctx.strokeStyle = '#3a4250';
    ctx.lineWidth = 1;
    ctx.stroke();
    // 鏡面ハイライト（小さく強い）
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.35, b.y - b.r * 0.4, b.r * 0.32, 0, Math.PI * 2);
    ctx.fill();
    // 反対側の弱反射
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(b.x + b.r * 0.4, b.y + b.r * 0.45, b.r * 0.15, 0, Math.PI * 2);
    ctx.fill();
  }

  // フェーズ別オーバーレイ
  if (phase === PHASE_CLEAR_BANNER) {
    drawClearBanner();
  } else if (phase === PHASE_MAP_TRANSIT || phase === PHASE_MAP_WAIT) {
    drawWorldMap();
  }
}

function drawClearBanner() {
  // 半透明の暗幕
  const fade = clamp((BANNER_DURATION - phaseTimer) / 0.3, 0, 1);
  ctx.fillStyle = `rgba(0,0,0,${0.4 * fade})`;
  ctx.fillRect(0, 0, W, H);

  const node = nodeAt(currentNodeIdx);
  const cx = W / 2;
  const cy = H / 2;

  // バナー本体
  const bannerW = 460;
  const bannerH = 130;
  ctx.save();
  ctx.translate(cx, cy);
  const sc = 0.7 + 0.3 * fade;
  ctx.scale(sc, sc);
  ctx.fillStyle = node.color;
  ctx.beginPath();
  roundRectPath(-bannerW / 2, -bannerH / 2, bannerW, bannerH, 18);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 4;
  ctx.beginPath();
  roundRectPath(-bannerW / 2, -bannerH / 2, bannerW, bannerH, 18);
  ctx.stroke();
  // テキスト
  ctx.fillStyle = '#222';
  ctx.font = 'bold 56px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${node.emoji} ${node.label} CLEAR!`, 0, -10);
  ctx.font = 'bold 24px system-ui, sans-serif';
  ctx.fillStyle = '#5a3a1f';
  const reward = isBossNode(currentNodeIdx)
    ? BOSS_CONFIG[currentBossType()].reward
    : isBonusNode(currentNodeIdx) ? 100 : 30;
  ctx.fillText(`+${reward} コイン`, 0, 38);
  // ボーナスステージはおまけ表示
  if (isBonusNode(currentNodeIdx)) {
    ctx.font = 'bold 16px system-ui, sans-serif';
    ctx.fillStyle = '#a87a14';
    ctx.fillText('💰 ボーナス！稼げたかな？', 0, 70);
  }
  // 2巡目（金）ボス撃破時は GAME COMPLETE
  if (isBossNode(currentNodeIdx) && currentBossType() === 'gold') {
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.fillStyle = '#a87a14';
    ctx.fillText('🎉 GAME COMPLETE 🎉', 0, 70);
  }
  ctx.restore();
}

function drawWorldMap() {
  // 暗い夜空背景
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a2244');
  g.addColorStop(1, '#0a0e22');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // 星
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 60; i++) {
    const sx = (i * 137) % W;
    const sy = (i * 71) % (H - 200);
    ctx.fillRect(sx, sy + 30, 1.5, 1.5);
  }

  // タイトル
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`～ WORLD MAP ～  ${loopCount}巡目`, W / 2, 50);

  // パスを描く（点線で接続）
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 6]);
  for (let i = 0; i < TOTAL_NODES - 1; i++) {
    const a = getNodePos(i);
    const b = getNodePos(i + 1);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // ノード描画
  for (let i = 0; i < TOTAL_NODES; i++) {
    const p = getNodePos(i);
    const node = nodeAt(i);
    // 現在ノードは「直前にクリアしたノード」として扱う（wrap時は緑無し）
    const wrap = nextNodeIdx === 0 && currentNodeIdx === TOTAL_NODES - 1;
    const isPast = !wrap && i <= currentNodeIdx;
    const isCurrent = i === currentNodeIdx;
    const isNext = i === nextNodeIdx;

    // 円
    const r = (isCurrent || isNext) ? 32 : 26;
    ctx.fillStyle = isPast ? 'rgba(120,200,120,0.7)' : node.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = isCurrent ? '#ffd86b' : isNext ? '#ffd86b' : 'rgba(255,255,255,0.5)';
    ctx.lineWidth = isCurrent || isNext ? 3 : 2;
    ctx.stroke();

    // 絵文字
    ctx.font = `${r}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(node.emoji, p.x, p.y + 2);

    // ラベル
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px system-ui, sans-serif';
    ctx.fillText(node.label, p.x, p.y + r + 18);

    // クリア済みチェック
    if (isPast) {
      ctx.fillStyle = '#7cf585';
      ctx.font = 'bold 22px system-ui, sans-serif';
      ctx.fillText('✓', p.x + r - 4, p.y - r + 4);
    }
  }

  // 傘キャラの位置（歩行中 or 待機中）
  let cx, cy;
  if (phase === PHASE_MAP_TRANSIT) {
    const a = getNodePos(currentNodeIdx);
    const b = getNodePos(nextNodeIdx);
    const t = walkProgress;
    const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    cx = a.x + (b.x - a.x) * e;
    cy = a.y + (b.y - a.y) * e;
    const hop = Math.abs(Math.sin(t * Math.PI * 4)) * 8;
    drawUmbrellaIcon(cx, cy - 30 - hop);
  } else {
    // PHASE_MAP_WAIT: 現在ノードの上で軽く揺れる
    const p = getNodePos(currentNodeIdx);
    cx = p.x; cy = p.y;
    const wobble = Math.sin(performance.now() / 200) * 2;
    drawUmbrellaIcon(cx, cy - 30 + wobble);
  }

  // STARTボタン（待機中のみ）
  if (phase === PHASE_MAP_WAIT) {
    drawStartButton();
  }
}

function getStartButtonRect() {
  const p = getNodePos(currentNodeIdx);
  const w = 140, h = 44;
  // ノードの下に配置（下段ノードの場合は上に）
  const below = p.y < H / 2;
  const y = below ? p.y + 60 : p.y - 60 - h;
  return { x: p.x - w / 2, y, w, h };
}

function drawStartButton() {
  const r = getStartButtonRect();
  const t = performance.now() / 1000;
  const pulse = 1 + Math.sin(t * 5) * 0.06;
  const cx = r.x + r.w / 2;
  const cy = r.y + r.h / 2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(pulse, pulse);
  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  roundRectPath(-r.w / 2 + 2, -r.h / 2 + 3, r.w, r.h, 10);
  ctx.fill();
  // 本体
  ctx.fillStyle = '#ffd86b';
  ctx.beginPath();
  roundRectPath(-r.w / 2, -r.h / 2, r.w, r.h, 10);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  roundRectPath(-r.w / 2, -r.h / 2, r.w, r.h, 10);
  ctx.stroke();
  // テキスト
  ctx.fillStyle = '#1a2238';
  ctx.font = 'bold 20px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('▶ START', 0, 1);
  ctx.restore();
}

function isInStartButton(x, y) {
  if (phase !== PHASE_MAP_WAIT) return false;
  const r = getStartButtonRect();
  // タップ判定は視覚より少し大きく（指の精度に余裕）
  const pad = 16;
  return x >= r.x - pad && x <= r.x + r.w + pad && y >= r.y - pad && y <= r.y + r.h + pad;
}

function drawUmbrellaIcon(x, y) {
  const skin = getSkin();
  ctx.save();
  ctx.translate(x, y);
  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(0, 16, 14, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  // ドーム（スキン）
  const R = 16;
  fillSkinDome(R, skin);
  ctx.strokeStyle = skin.frame;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, R, Math.PI, 0, false);
  ctx.stroke();
  // 持ち手
  ctx.strokeStyle = '#5a3a1f';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, 14);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(-2, 14, 2.5, 0, Math.PI, true);
  ctx.stroke();
  ctx.restore();
}

function fillSkinDome(R, skin) {
  // 上半円にクリップしてからパターン塗り
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(-R, 0);
  ctx.arc(0, 0, R, Math.PI, 0, false);
  ctx.closePath();
  ctx.clip();
  if (skin.pattern === 'stripes') {
    const ns = 8;
    const sw = (R * 2) / ns;
    for (let i = 0; i < ns; i++) {
      ctx.fillStyle = i % 2 === 0 ? skin.dome : skin.frame;
      ctx.fillRect(-R + i * sw, -R, sw, R);
    }
  } else if (skin.pattern === 'dots') {
    ctx.fillStyle = skin.dome;
    ctx.fillRect(-R, -R, R * 2, R);
    ctx.fillStyle = skin.dotColor || '#e63946';
    const step = Math.max(8, R * 0.22);
    for (let dy = -R + step / 2; dy < 0; dy += step) {
      for (let dx = -R + step / 2; dx < R; dx += step) {
        ctx.beginPath();
        ctx.arc(dx, dy, step * 0.22, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  } else if (skin.pattern === 'gradient') {
    const g = ctx.createLinearGradient(-R, 0, R, 0);
    g.addColorStop(0,    '#ff3a3a');
    g.addColorStop(0.16, '#ff9c2a');
    g.addColorStop(0.33, '#ffd86b');
    g.addColorStop(0.5,  '#7cf585');
    g.addColorStop(0.66, '#3aa0ff');
    g.addColorStop(0.83, '#7b3aff');
    g.addColorStop(1,    '#ff3aaa');
    ctx.fillStyle = g;
    ctx.fillRect(-R, -R, R * 2, R);
  } else {
    // solid
    ctx.fillStyle = skin.dome;
    ctx.fillRect(-R, -R, R * 2, R);
  }
  ctx.restore();
}

function drawUmbrella(x, y) {
  const skin = getSkin();
  ctx.save();
  ctx.translate(x, y);
  const R = umbrella.halfW;

  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(2, 8, R * 0.95, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // 持ち手
  ctx.strokeStyle = '#5a3a1f';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, 16);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(-3, 16, 3, 0, Math.PI, true);
  ctx.stroke();

  // ドーム本体（スキン別パターン）
  fillSkinDome(R, skin);

  // ドームの縁
  ctx.strokeStyle = skin.frame;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(0, 0, R, Math.PI, 0, false);
  ctx.stroke();

  // 内側薄縁
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, 0, R - 1.5, Math.PI, 0, false);
  ctx.stroke();

  // 傘の骨
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 5; i++) {
    const a = Math.PI - (i / 5) * Math.PI;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a) * R, -Math.sin(a) * R);
    ctx.stroke();
  }

  // 中央のキャップ
  ctx.fillStyle = skin.frame;
  ctx.beginPath();
  ctx.arc(0, 0, 3, 0, Math.PI * 2);
  ctx.fill();

  // 下ライン（跳ね返り面の境界）
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-R, 0);
  ctx.lineTo(R, 0);
  ctx.stroke();

  ctx.restore();
}

function drawZako(z) {
  const bob = Math.sin(z.bobPhase) * 1.5;
  const cx = z.x;
  const cy = z.y + bob;
  const w = z.w, h = z.h;

  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(cx + 1, cy + h / 2 + 2, w * 0.4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // 本体（HP残量で色を変える）
  const hpRatio = z.hp / z.maxHp;
  const baseColor = hpRatio > 0.66 ? '#7b5cff' : hpRatio > 0.33 ? '#a87ed4' : '#d49ec8';
  ctx.fillStyle = baseColor;
  ctx.beginPath();
  ctx.roundRect(cx - w / 2, cy - h / 2, w, h, 8);
  ctx.fill();
  if (z.hitFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${z.hitFlash * 0.7})`;
    ctx.beginPath();
    roundRectPath(cx - w / 2, cy - h / 2, w, h, 8);
    ctx.fill();
  }
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.roundRect(cx - w / 2, cy - h / 2, w, h, 8);
  ctx.stroke();

  // 目（左右）
  const eyeY = cy - 3;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx - 7, eyeY, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 7, eyeY, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(cx - 7, eyeY, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 7, eyeY, 2, 0, Math.PI * 2); ctx.fill();

  // HPバー
  const barW = w * 0.8, barH = 3;
  const bx = cx - barW / 2, by = cy + h / 2 - 7;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(bx, by, barW, barH);
  ctx.fillStyle = hpRatio > 0.5 ? '#7cf585' : hpRatio > 0.25 ? '#ffd86b' : '#ff6b7a';
  ctx.fillRect(bx, by, barW * hpRatio, barH);
}

function drawStageBar() {
  // 上部の細い進行バー
  const barW = W - 40, barH = 5;
  const bx = 20, by = 8;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillRect(bx, by, barW, barH);
  const ratio = stageProgress / currentStageLength();
  ctx.fillStyle = '#7cf585';
  ctx.fillRect(bx, by, barW * ratio, barH);
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx + 0.5, by + 0.5, barW - 1, barH - 1);
}

function drawItem(it) {
  const bob = Math.sin(it.bobPhase) * 3;
  const cx = it.x;
  const cy = it.y + bob;
  // ハロー
  const haloColor = it.type === 'wide' ? 'rgba(80,180,255,0.35)' : 'rgba(255,150,60,0.35)';
  ctx.fillStyle = haloColor;
  ctx.beginPath();
  ctx.arc(cx, cy, ITEM_R + 6, 0, Math.PI * 2);
  ctx.fill();
  // 本体
  ctx.fillStyle = it.type === 'wide' ? '#3aa0ff' : '#ff8a3a';
  ctx.beginPath();
  ctx.arc(cx, cy, ITEM_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
  // 文字
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(it.type === 'wide' ? 'W' : 'M', cx, cy + 1);
}

function drawActiveEffects() {
  if (wideTimer <= 0) return;
  // 画面右上にWIDE残り時間
  const x = W - 110;
  const y = 24;
  const w = 100, h = 22;
  ctx.fillStyle = 'rgba(58,160,255,0.85)';
  ctx.beginPath();
  roundRectPath(x, y, w, h, 6);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(`🌂 WIDE ${wideTimer.toFixed(1)}s`, x + 8, y + h / 2);
}

// ============================================================
// UI
// ============================================================
function updateUI() {
  elCoins.textContent = coins;
  elBallStock.textContent = ballStock;
  elScore.textContent = score;
  elComboBest.textContent = comboBest;
  elStage.textContent = stageNum;
  // 移動中は次の季節を先取りで表示、それ以外は現在の季節
  // 移動中は次の季節を先取り、待機中＆プレイ中は現在の季節
  const idx = phase === PHASE_MAP_TRANSIT ? nextNodeIdx : Math.max(0, currentNodeIdx);
  const node = nodeAt(idx);
  elSeasonEmoji.textContent = node.emoji;
  elSeasonLabel.textContent = node.label;
}

let msgTimer = null;
function showMsg(text) {
  elMsg.textContent = text;
  elMsg.classList.add('show');
  if (msgTimer) clearTimeout(msgTimer);
  msgTimer = setTimeout(() => elMsg.classList.remove('show'), 1100);
}

// ============================================================
// ユーティリティ
// ============================================================
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

function roundRectPath(x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);
  ctx.moveTo(x + rr, y);
  ctx.arcTo(x + w, y, x + w, y + h, rr);
  ctx.arcTo(x + w, y + h, x, y + h, rr);
  ctx.arcTo(x, y + h, x, y, rr);
  ctx.arcTo(x, y, x + w, y, rr);
  ctx.closePath();
}

// ============================================================
// メインループ
// ============================================================
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  update(dt);
  updateBgm();
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
