<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>的当てゲーム</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0b1020;
    font-family: system-ui, -apple-system, "Hiragino Sans", sans-serif;
    color: #fff;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #wrap { position: relative; width: 100%; height: 100%; }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
  #hud {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between;
    font-size: 18px; font-weight: 700;
    text-shadow: 0 2px 4px rgba(0,0,0,.6);
    pointer-events: none;
  }
  @keyframes scorePunch {
    0%   { transform: scale(1.6) translateX(-6px); color: #ff4d4d; }
    25%  { transform: scale(1.6) translateX(6px);  color: #ff4d4d; }
    50%  { transform: scale(1.4) translateX(-4px); color: #ff8888; }
    100% { transform: scale(1) translateX(0);      color: #fff; }
  }
  #score.punch { display: inline-block; animation: scorePunch .45s ease-out; }
  #version {
    position: absolute; right: 8px; bottom: 6px;
    font-size: 11px; font-family: ui-monospace, Menlo, Consolas, monospace;
    color: rgba(255,255,255,0.45);
    text-shadow: 0 1px 2px rgba(0,0,0,.5);
    pointer-events: none; user-select: none;
    letter-spacing: .5px;
  }
  #overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.55);
    text-align: center;
    padding: 20px;
  }
  #overlay.hidden { display: none; }
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
  }
  .screen.active { display: flex; }
  .screen h1 { font-size: clamp(24px, 6vw, 48px); margin-bottom: 12px; }
  .screen p  { font-size: clamp(14px, 3vw, 18px); margin-bottom: 18px; opacity: .85; line-height: 1.5; }
  #diffWrap {
    display: grid; grid-template-columns: repeat(2, minmax(120px, 1fr));
    gap: 12px; width: min(360px, 90vw);
  }
  .diffBtn {
    font-size: 18px; padding: 14px 18px;
    color: #fff; border: none; border-radius: 14px;
    cursor: pointer; font-weight: 700;
    box-shadow: 0 4px 14px rgba(0,0,0,.35);
  }
  .diffBtn:active { transform: scale(.96); }
  .diffBtn[data-diff="easy"]   { background: #38b000; box-shadow: 0 4px 14px rgba(56,176,0,.45); }
  .diffBtn[data-diff="normal"] { background: #2a9df4; box-shadow: 0 4px 14px rgba(42,157,244,.45); }
  .diffBtn[data-diff="hard"]   { background: #ff8800; box-shadow: 0 4px 14px rgba(255,136,0,.45); }
  .diffBtn[data-diff="oni"]    { background: #c1121f; box-shadow: 0 4px 14px rgba(193,18,31,.5); }
  .diffLabel { font-size: 14px; opacity: .9; margin-bottom: 8px; }
  .primaryBtn {
    font-size: 20px; padding: 14px 36px;
    background: #ff4d6d; color: #fff;
    border: none; border-radius: 999px;
    cursor: pointer; font-weight: 700;
    box-shadow: 0 6px 20px rgba(255,77,109,.5);
  }
  .primaryBtn:active { transform: scale(.96); }
  .secondaryBtn {
    font-size: 16px; padding: 12px 28px;
    background: rgba(255,255,255,0.15); color: #fff;
    border: 1px solid rgba(255,255,255,0.35); border-radius: 999px;
    cursor: pointer; font-weight: 600;
  }
  .secondaryBtn:active { transform: scale(.96); }
  .endActions { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
  .backBtn {
    margin-top: 18px; font-size: 14px;
    background: transparent; color: rgba(255,255,255,0.7);
    border: none; cursor: pointer; padding: 6px 14px;
  }
  .backBtn:hover { color: #fff; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="hud">
    <div>スコア: <span id="score">0</span> &nbsp;/&nbsp; ハイ: <span id="hiscore">0</span></div>
    <div>残り: <span id="time">30</span>秒</div>
  </div>
  <div id="version">v1.2.0</div>
  <div id="overlay">
    <div class="screen active" id="screenStart">
      <h1>的当てゲーム</h1>
      <p>右から流れてくる的を撃ち落とそう!<br>🧨 爆弾は触らない / ❄️ 氷は2回タップ<br>制限時間 30秒</p>
      <button id="btnGoDiff" class="primaryBtn">スタート</button>
    </div>

    <div class="screen" id="screenDiff">
      <h1>難易度を選択</h1>
      <div id="diffWrap">
        <button class="diffBtn" data-diff="easy">やさしい</button>
        <button class="diffBtn" data-diff="normal">ふつう</button>
        <button class="diffBtn" data-diff="hard">むつかしい</button>
        <button class="diffBtn" data-diff="oni">鬼</button>
      </div>
      <button id="btnDiffBack" class="backBtn">← もどる</button>
    </div>

    <div class="screen" id="screenEnd">
      <h1 id="endTitle">終了!</h1>
      <p id="endDesc"></p>
      <div class="endActions">
        <button id="btnAgain" class="primaryBtn">もう一度</button>
        <button id="btnQuit" class="secondaryBtn">やめる</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const hiscoreEl = document.getElementById('hiscore');
  const timeEl = document.getElementById('time');
  const overlay = document.getElementById('overlay');
  const endTitleEl = document.getElementById('endTitle');
  const endDescEl = document.getElementById('endDesc');
  const diffBtns = document.querySelectorAll('.diffBtn');
  const btnGoDiff = document.getElementById('btnGoDiff');
  const btnDiffBack = document.getElementById('btnDiffBack');
  const btnAgain = document.getElementById('btnAgain');
  const btnQuit = document.getElementById('btnQuit');

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if (name) {
      const el = document.getElementById('screen' + name);
      if (el) el.classList.add('active');
      overlay.classList.remove('hidden');
    } else {
      overlay.classList.add('hidden');
    }
  }

  const DIFFICULTIES = {
    easy:   { label: 'やさしい',  rMin: 26, rRand: 26, sBase: 70,  sRand: 110, sRamp: 3,  intvBase: 950,  intvMin: 380, intvRamp: 16, tap: 22, bombChance: 0.08, bombPenalty: 4,  iceChance: 0.10 },
    normal: { label: 'ふつう',    rMin: 16, rRand: 24, sBase: 100, sRand: 160, sRamp: 5,  intvBase: 720,  intvMin: 230, intvRamp: 20, tap: 14, bombChance: 0.12, bombPenalty: 6,  iceChance: 0.12 },
    hard:   { label: 'むつかしい', rMin: 14, rRand: 18, sBase: 120, sRand: 180, sRamp: 6,  intvBase: 600,  intvMin: 200, intvRamp: 22, tap: 10, bombChance: 0.18, bombPenalty: 8,  iceChance: 0.12 },
    oni:    { label: '鬼',        rMin: 10, rRand: 14, sBase: 180, sRand: 240, sRamp: 10, intvBase: 380,  intvMin: 130, intvRamp: 28, tap: 4,  bombChance: 0.25, bombPenalty: 12, iceChance: 0.10 },
  };
  const DIFF_ORDER = ['easy', 'normal', 'hard', 'oni'];
  let cfg = DIFFICULTIES.normal;
  let curDiffKey = 'normal';

  const HS_KEY = 'dtt-mini-shoot:hi:v1';
  function loadHi() {
    try { return JSON.parse(localStorage.getItem(HS_KEY) || '{}'); }
    catch (e) { return {}; }
  }
  function saveHi(map) {
    try { localStorage.setItem(HS_KEY, JSON.stringify(map)); } catch (e) {}
  }
  function getHi(diff) { return loadHi()[diff] || 0; }
  function setHi(diff, v) {
    const m = loadHi();
    m[diff] = v;
    saveHi(m);
  }

  let W = 0, H = 0, dpr = 1;
  const wrap = document.getElementById('wrap');
  function viewportSize() {
    const vv = window.visualViewport;
    return {
      w: vv ? vv.width : window.innerWidth,
      h: vv ? vv.height : window.innerHeight,
    };
  }
  function resize() {
    dpr = window.devicePixelRatio || 1;
    const v = viewportSize();
    W = v.w;
    H = v.h;
    document.documentElement.style.height = H + 'px';
    document.body.style.height = H + 'px';
    wrap.style.width = W + 'px';
    wrap.style.height = H + 'px';
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', resize);
    window.visualViewport.addEventListener('scroll', resize);
  }
  resize();

  const targets = [];
  const particles = [];
  let score = 0;
  let timeLeft = 30;
  let running = false;
  let lastSpawn = 0;
  let spawnInterval = 900;
  let lastTime = 0;
  let timerId = null;
  let secondStart = 0;
  let shakeUntil = 0;
  let flashStart = -9999;

  function spawnTarget() {
    const isBomb = Math.random() < cfg.bombChance;
    const isIce = !isBomb && Math.random() < cfg.iceChance;
    const r = isBomb
      ? Math.max(18, cfg.rMin + Math.random() * cfg.rRand * 0.7)
      : cfg.rMin + Math.random() * cfg.rRand;
    const topPad = 56;
    const bottomPad = 72;
    const minY = r + topPad;
    const maxY = H - r - bottomPad;
    const y = maxY > minY ? minY + Math.random() * (maxY - minY) : H / 2;
    const speed = cfg.sBase + Math.random() * cfg.sRand + (30 - timeLeft) * cfg.sRamp;
    const hue = Math.floor(Math.random() * 360);
    targets.push({ x: W + r, y, r, vx: -speed, hue, alive: true, bomb: isBomb, ice: isIce, frozen: false });
  }

  function spawnParticles(x, y, hue) {
    for (let i = 0; i < 14; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 100 + Math.random() * 200;
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 0.6,
        age: 0,
        hue,
      });
    }
  }

  function spawnIceBurst(x, y, count, big) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = (big ? 150 : 70) + Math.random() * (big ? 220 : 120);
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: big ? 0.7 : 0.45,
        age: 0,
        hue: 195 + Math.random() * 25,
      });
    }
  }

  function spawnBombParticles(x, y) {
    for (let i = 0; i < 30; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 200 + Math.random() * 400;
      const hue = 10 + Math.random() * 35;
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 0.9,
        age: 0,
        hue,
      });
    }
  }

  function triggerExplosion() {
    shakeUntil = performance.now() + 300;
    flashStart = performance.now();
    scoreEl.classList.remove('punch');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('punch');
  }

  function hit(x, y) {
    let hitOne = false;
    for (let i = targets.length - 1; i >= 0; i--) {
      const t = targets[i];
      if (!t.alive) continue;
      const dx = x - t.x, dy = y - t.y;
      const hitR = t.r + cfg.tap;
      if (dx * dx + dy * dy <= hitR * hitR) {
        hitOne = true;
        if (t.bomb) {
          t.alive = false;
          spawnBombParticles(t.x, t.y);
          score = Math.max(0, score - cfg.bombPenalty);
          triggerExplosion();
          targets.splice(i, 1);
        } else if (t.ice && !t.frozen) {
          t.frozen = true;
          t.vx = 0;
          spawnIceBurst(t.x, t.y, 8, false);
          score += 1;
        } else if (t.ice) {
          t.alive = false;
          spawnIceBurst(t.x, t.y, 18, true);
          score += Math.max(2, Math.round(50 / t.r * 10) * 2);
          targets.splice(i, 1);
        } else {
          t.alive = false;
          spawnParticles(t.x, t.y, t.hue);
          score += Math.max(1, Math.round(50 / t.r * 10));
          targets.splice(i, 1);
        }
        scoreEl.textContent = score;
        break;
      }
    }
    if (!hitOne) {
      score = Math.max(0, score - 1);
      scoreEl.textContent = score;
    }
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src = (e.touches && e.touches[0]) ? e.touches[0] : e;
    const sx = W / rect.width;
    const sy = H / rect.height;
    return {
      x: (src.clientX - rect.left) * sx,
      y: (src.clientY - rect.top) * sy,
    };
  }

  canvas.addEventListener('mousedown', (e) => {
    if (!running) return;
    const p = getPos(e);
    hit(p.x, p.y);
  });
  canvas.addEventListener('touchstart', (e) => {
    if (!running) return;
    e.preventDefault();
    const p = getPos(e);
    hit(p.x, p.y);
  }, { passive: false });

  function drawTarget(t) {
    if (t.bomb) { drawBomb(t); return; }
    if (t.ice)  { drawIce(t);  return; }
    const { x, y, r, hue } = t;
    ctx.save();
    ctx.translate(x, y);
    const grad = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r);
    grad.addColorStop(0, `hsl(${hue}, 90%, 70%)`);
    grad.addColorStop(1, `hsl(${hue}, 80%, 40%)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.55, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.18, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawIce(t) {
    const { x, y, r, frozen } = t;
    ctx.save();
    ctx.translate(x, y);
    if (frozen) {
      const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 220);
      ctx.fillStyle = `rgba(200,235,255,${0.18 + pulse * 0.18})`;
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.35, 0, Math.PI * 2);
      ctx.fill();
    }
    const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.15, 0, 0, r);
    grad.addColorStop(0, '#ecfaff');
    grad.addColorStop(0.6, '#7fcdff');
    grad.addColorStop(1, '#3a8fd1');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = frozen ? '#ffffff' : 'rgba(220,245,255,0.95)';
    ctx.lineWidth = frozen ? Math.max(4, r * 0.15) : 3;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.95)';
    ctx.lineWidth = Math.max(2, r * 0.11);
    ctx.lineCap = 'round';
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * r * 0.7, Math.sin(a) * r * 0.7);
      ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.16, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawBomb(t) {
    const { x, y, r } = t;
    ctx.save();
    ctx.translate(x, y);
    const grad = ctx.createRadialGradient(-r * 0.35, -r * 0.35, r * 0.1, 0, 0, r);
    grad.addColorStop(0, '#5a5a5a');
    grad.addColorStop(0.6, '#1d1d1d');
    grad.addColorStop(1, '#000');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,80,80,0.85)';
    ctx.lineWidth = Math.max(2, r * 0.12);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.arc(-r * 0.35, -r * 0.35, r * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#888';
    ctx.lineWidth = Math.max(2, r * 0.12);
    ctx.beginPath();
    ctx.moveTo(0, -r);
    ctx.quadraticCurveTo(r * 0.35, -r * 1.35, r * 0.55, -r * 1.55);
    ctx.stroke();
    const pulse = 1 + Math.sin(performance.now() / 80) * 0.35;
    ctx.fillStyle = '#ff7a00';
    ctx.beginPath();
    ctx.arc(r * 0.6, -r * 1.6, r * 0.22 * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff5b0';
    ctx.beginPath();
    ctx.arc(r * 0.6, -r * 1.6, r * 0.1 * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function update(dt) {
    lastSpawn += dt * 1000;
    const interval = Math.max(cfg.intvMin, cfg.intvBase - (30 - timeLeft) * cfg.intvRamp);
    if (lastSpawn >= interval) {
      lastSpawn = 0;
      spawnTarget();
    }
    for (let i = targets.length - 1; i >= 0; i--) {
      const t = targets[i];
      t.x += t.vx * dt;
      if (t.x + t.r < 0) targets.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age += dt;
      if (p.age >= p.life) { particles.splice(i, 1); continue; }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.96;
      p.vy *= 0.96;
    }
  }

  function render() {
    ctx.fillStyle = '#0b1020';
    ctx.fillRect(0, 0, W, H);
    const now = performance.now();
    let dx = 0, dy = 0;
    if (now < shakeUntil) {
      const t = (shakeUntil - now) / 300;
      const amt = 14 * t;
      dx = (Math.random() - 0.5) * amt;
      dy = (Math.random() - 0.5) * amt;
    }
    ctx.save();
    ctx.translate(dx, dy);
    // 背景の流線
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const y = ((Date.now() / 20 + i * 100) % H);
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
    if (timeLeft > 0 && timeLeft <= 3) {
      const t = Math.min(1, (performance.now() - secondStart) / 1000);
      const scale = 1 + (1 - t) * 0.18;
      const alpha = 0.13 - t * 0.05;
      const size = Math.round(Math.min(W, H) * 0.7 * scale);
      ctx.save();
      ctx.fillStyle = `rgba(255, 230, 230, ${alpha})`;
      ctx.font = `900 ${size}px system-ui, -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(timeLeft), W / 2, H / 2);
      ctx.restore();
    }
    for (const t of targets) drawTarget(t);
    for (const p of particles) {
      const alpha = 1 - p.age / p.life;
      ctx.fillStyle = `hsla(${p.hue}, 90%, 65%, ${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4 * alpha + 1, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
    const flashElapsed = performance.now() - flashStart;
    if (flashElapsed < 350) {
      const a = 0.45 * (1 - flashElapsed / 350);
      ctx.fillStyle = `rgba(255, 60, 60, ${a})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function loop(ts) {
    if (!running) return;
    if (!lastTime) lastTime = ts;
    const dt = Math.min(0.05, (ts - lastTime) / 1000);
    lastTime = ts;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function start(diffKey) {
    curDiffKey = (diffKey in DIFFICULTIES) ? diffKey : 'normal';
    cfg = DIFFICULTIES[curDiffKey];
    score = 0;
    timeLeft = 30;
    targets.length = 0;
    particles.length = 0;
    lastSpawn = 0;
    lastTime = 0;
    shakeUntil = 0;
    flashStart = -9999;
    scoreEl.classList.remove('punch');
    scoreEl.textContent = score;
    hiscoreEl.textContent = getHi(curDiffKey);
    timeEl.textContent = timeLeft;
    showScreen(null);
    running = true;
    secondStart = performance.now();
    requestAnimationFrame(loop);
    timerId = setInterval(() => {
      timeLeft--;
      secondStart = performance.now();
      timeEl.textContent = timeLeft;
      if (timeLeft <= 0) end();
    }, 1000);
  }

  function hiTable() {
    const rows = DIFF_ORDER.map(k => {
      const cur = (k === curDiffKey) ? ' style="font-weight:700"' : '';
      return `<tr${cur}><td style="text-align:left;padding:2px 10px">${DIFFICULTIES[k].label}</td><td style="text-align:right;padding:2px 10px">${getHi(k)}</td></tr>`;
    }).join('');
    return `<table style="margin:10px auto;font-size:14px;opacity:.95"><tbody>${rows}</tbody></table>`;
  }

  function end() {
    running = false;
    clearInterval(timerId);
    const prev = getHi(curDiffKey);
    const isNew = score > prev;
    if (isNew) setHi(curDiffKey, score);
    hiscoreEl.textContent = getHi(curDiffKey);
    endTitleEl.textContent = isNew ? '🏆 新記録!' : '終了!';
    endDescEl.innerHTML =
      `難易度: <b>${cfg.label}</b> &nbsp;/&nbsp; スコア: <b>${score}</b>` +
      (isNew ? `<br><span style="color:#ffd166">前回ベスト ${prev} を更新!</span>` : '') +
      hiTable();
    showScreen('End');
  }

  hiscoreEl.textContent = getHi('normal');
  btnGoDiff.addEventListener('click', () => showScreen('Diff'));
  btnDiffBack.addEventListener('click', () => showScreen('Start'));
  btnAgain.addEventListener('click', () => showScreen('Diff'));
  btnQuit.addEventListener('click', () => showScreen('Start'));
  diffBtns.forEach(btn => btn.addEventListener('click', () => start(btn.dataset.diff)));
})();
</script>
</body>
</html>
