<style>
  :root {
    --cream: #FFEED5;
    --cream-light: #FFF8E7;
    --warm-gold: #F0C988;
    --wood-light: #D8A86A;
    --wood: #B8884E;
    --wood-dark: #8B5A2B;
    --accent: #FF8C42;
    --accent-dark: #C9610B;
    --accent-soft: #FFB060;
    --text-brown: #5D3A1A;
    --paper: #FFF5E0;
    --good: #4CAF50;
    --danger: #E53935;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  [hidden] { display: none !important; }
  html, body {
    height: 100%;
    height: 100dvh;
    background: linear-gradient(180deg, #FFF4E0 0%, #F5C988 100%);
    color: var(--text-brown);
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    touch-action: none;
  }
  button { font-family: inherit; }

  #version {
    position: fixed;
    bottom: 4px;
    right: 8px;
    font-size: 10px;
    color: rgba(93, 58, 26, 0.5);
    z-index: 200;
    pointer-events: none;
  }

  /* Title */
  #title-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 28px 20px;
    width: 100%;
    max-width: 420px;
    gap: 14px;
  }
  #title-screen h1 {
    font-size: clamp(32px, 8vw, 52px);
    color: var(--accent-dark);
    margin: 8px 0 6px;
    letter-spacing: 0.08em;
    text-shadow: 0 2px 8px rgba(255, 200, 130, 0.5);
    white-space: nowrap;
  }
  #title-screen .subtitle {
    font-size: 14px;
    margin-bottom: 22px;
    opacity: 0.85;
    line-height: 1.7;
  }
  #title-icon {
    width: 150px;
    height: 150px;
    margin: 0 auto;
  }
  .btn {
    padding: 14px 36px;
    font-size: 17px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    margin: 6px;
    box-shadow: 0 4px 0 var(--accent-dark);
    transition: transform 0.05s, box-shadow 0.05s;
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--accent-dark); }
  .btn.secondary {
    background: var(--cream-light);
    color: var(--text-brown);
    box-shadow: 0 4px 0 var(--wood);
  }
  .btn.secondary:active { box-shadow: 0 2px 0 var(--wood); }
  #rules {
    text-align: left;
    background: rgba(255, 245, 220, 0.85);
    border: 2px solid #E8B98C;
    border-radius: 10px;
    padding: 14px 18px;
    margin: 18px 0 14px;
    font-size: 13px;
    line-height: 1.7;
  }
  #rules b { color: var(--accent-dark); font-weight: 700; }

  #hs-bar {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 245, 220, 0.85);
    border: 2px solid var(--accent-soft);
    border-radius: 999px;
    padding: 6px 22px;
    margin: 4px 0 18px;
    font-size: 13px;
  }
  #hs-bar .label {
    color: var(--wood-dark);
    font-weight: bold;
    letter-spacing: 0.12em;
  }
  #hs-bar .value {
    color: var(--accent-dark);
    font-weight: bold;
    font-size: 18px;
  }

  .new-record {
    color: var(--accent);
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 6px;
    animation: pulse-record 0.8s ease-in-out infinite alternate;
  }
  @keyframes pulse-record {
    from { transform: scale(1); }
    to { transform: scale(1.06); }
  }

  /* Game */
  #game-screen {
    display: flex;
    flex-direction: column;
    width: 100vw;
    width: 100dvw;
    height: 100vh;
    height: 100dvh;
    position: relative;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: stretch;
    padding: 8px 10px;
    gap: 8px;
    background: linear-gradient(180deg, var(--cream-light), #FFEEC8);
    color: var(--text-brown);
    border-bottom: 2px solid var(--wood-light);
    z-index: 5;
  }
  #order-panel {
    flex: 1;
    background: var(--paper);
    border-radius: 10px;
    border: 1px solid #E8C088;
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 0 rgba(184, 136, 78, 0.4);
  }
  #order-img { width: 46px; height: 46px; flex-shrink: 0; }
  #order-img svg { width: 100%; height: 100%; }
  #order-text { flex: 1; line-height: 1.3; }
  #order-text .label {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--wood-dark);
    font-weight: bold;
  }
  #order-text .name {
    font-weight: bold;
    font-size: 13px;
    color: var(--text-brown);
  }
  #order-progress {
    font-size: 18px;
    font-weight: bold;
    color: var(--good);
    min-width: 36px;
    text-align: center;
  }
  #score-panel {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 4px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 80px;
    box-shadow: 0 2px 0 var(--accent-dark);
  }
  #score-panel .label { font-size: 9px; opacity: 0.85; letter-spacing: 0.1em; }
  #score-panel .value { font-size: 22px; font-weight: bold; }

  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #game-canvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }

  #order-flash {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    background: var(--good);
    color: white;
    padding: 14px 32px;
    border-radius: 999px;
    font-size: 20px;
    font-weight: bold;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  #order-flash.show { animation: flash 1.2s ease-out forwards; }
  @keyframes flash {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -100%) scale(0.9); }
  }

  #recipe-bar {
    display: flex;
    justify-content: center;
    gap: 3px;
    padding: 6px 6px;
    background: var(--cream-light);
    border-top: 2px solid var(--wood-light);
    z-index: 5;
    flex-wrap: nowrap;
  }
  .recipe-cell {
    flex: 0 1 30px;
    width: 30px;
    height: 30px;
    min-width: 22px;
    background: rgba(220, 170, 100, 0.25);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.4;
    transition: opacity 0.3s, box-shadow 0.3s;
    position: relative;
  }
  .recipe-cell.unlocked {
    opacity: 1;
    background: #FFE5BA;
    box-shadow: 0 0 8px var(--accent-soft);
  }
  .recipe-cell svg { width: 90%; height: 90%; }
  .recipe-cell .lvnum {
    position: absolute;
    bottom: -1px; right: 2px;
    font-size: 9px;
    color: var(--accent-dark);
    font-weight: bold;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(255, 248, 230, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    backdrop-filter: blur(4px);
    animation: fadein 0.2s;
    color: var(--text-brown);
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .overlay h2 {
    font-size: 32px;
    color: var(--accent-dark);
    margin-bottom: 12px;
    text-align: center;
  }
  .overlay p {
    margin-bottom: 22px;
    font-size: 16px;
    text-align: center;
    line-height: 1.6;
    max-width: 320px;
  }
</style>
</head>
<body>

<div id="version">v2.3.3 / build 2026-05-03-15</div>

<div id="title-screen">
  <div id="title-icon"></div>
  <h1>カフェマージ</h1>
  <div class="subtitle">ガイドの方向を決めて、<br>放したら発射!</div>
  <div id="rules">
    <b>遊び方</b><br>
    ・ 画面に <b>触れて方向を狙う</b> → <b>放すと発射</b><br>
    ・ 真上から左右60度の範囲内のみ撃てる<br>
    ・ ぶつかった同種は <b>合体</b> (連鎖もする)<br>
    ・ <b>テイクアウト</b> の注文を捌くと得点<br>
    ・ 危険ライン(赤点線)まで押し戻されたら終了
  </div>
  <div id="hs-bar"><span class="label">ハイスコア</span><span class="value" id="hs-value">0</span></div>
  <button id="start-btn" class="btn">スタート</button>
</div>

<div id="game-screen" hidden>
  <header id="hud">
    <div id="order-panel">
      <div id="order-img"></div>
      <div id="order-text">
        <div class="label">テイクアウト</div>
        <div class="name" id="order-name">―</div>
      </div>
      <div id="order-progress">0/1</div>
    </div>
    <div id="score-panel">
      <div class="label">SCORE</div>
      <div class="value" id="score-value">0</div>
    </div>
  </header>
  <div id="canvas-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="order-flash"></div>
  </div>
  <footer id="recipe-bar"></footer>
</div>

// ===== Preload SVG → Image =====
const drinkImages = {};
function preloadDrinks() {
  return Promise.all(
    Array.from({ length: MAX_LEVEL }, (_, i) => i + 1).map(lv => {
      return new Promise(resolve => {
        const svg = svgFor(lv);
        const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => { drinkImages[lv] = img; resolve(); };
        img.onerror = () => resolve();
        img.src = url;
      });
    })
  );
}

// ===== Order generation =====
function generateOrder(orderNum) {
  const idx = orderNum - 1;
  const tiers = [
    { level: 2, count: 1 },
    { level: 3, count: 1 },
    { level: 3, count: 2 },
    { level: 4, count: 1 },
    { level: 4, count: 2 },
    { level: 5, count: 1 },
    { level: 5, count: 2 },
    { level: 6, count: 1 },
    { level: 6, count: 2 },
    { level: 7, count: 1 },
    { level: 7, count: 2 },
    { level: 8, count: 1 },
    { level: 8, count: 2 },
    { level: 9, count: 1 },
    { level: 9, count: 2 },
    { level: 10, count: 1 },
  ];
  if (idx < tiers.length) return tiers[idx];
  const t = idx - tiers.length;
  const pool = [
    { level: 7, count: 2 }, { level: 8, count: 1 },
    { level: 8, count: 2 }, { level: 9, count: 1 },
    { level: 9, count: 2 }, { level: 10, count: 1 },
  ];
  return pool[t % pool.length];
}

// ===== Drink (physics body) =====
class Drink {
  constructor(level, x, y, vx = 0, vy = 0) {
    this.level = level;
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.drawRadius = RADIUS[level];
    this.radius = RADIUS[level] * VISIBLE_FACTOR[level]; // collision matches visible cup
    this.mass = this.drawRadius * this.drawRadius;       // mass tracks visual size
    this.id = Math.random();
  }
}

// ===== State =====
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
let wallLeft = 0, wallRight = 0;  // physics side walls (inset from canvas edges)
let drinks = [];
let player = { x: 0, y: 0, level: 1, cooldown: 0 };
let nextLevel = 1;
let aim = 0;          // angle from straight up, [-ANGLE_LIMIT, ANGLE_LIMIT]
let aiming = false;
let aimPointerId = null;
let score = 0;
let orderNum = 0;
let order = null;
let unlocked = new Set();
let dangerTimer = 0;
let running = false;
let lastTime = 0;
let mergeFlashes = [];
let dpr = 1;

function randomDrink() {
  const r = Math.random();
  if (r < 0.7) return 1;
  if (r < 0.93) return 2;
  return 3;
}

// ===== High score (localStorage) =====
const HS_KEY = 'cafe-merge-high-score';
function getHighScore() {
  try {
    const v = localStorage.getItem(HS_KEY);
    const n = parseInt(v, 10);
    return Number.isFinite(n) && n > 0 ? n : 0;
  } catch { return 0; }
}
function trySaveHighScore(s) {
  try {
    if (s > getHighScore()) {
      localStorage.setItem(HS_KEY, s.toString());
      return true;
    }
  } catch {}
  return false;
}
function refreshHsDisplay() {
  const el = document.getElementById('hs-value');
  if (el) el.textContent = getHighScore();
}

function recomputeBounds() {
  const minInset = W * PLAY_INSET_PCT;
  const inset = Math.max(minInset, (W - MAX_PLAY_WIDTH) / 2);
  wallLeft = inset;
  wallRight = W - inset;
}

function recomputeRadii() {
  const playW = wallRight - wallLeft;
  // anchor on Lv8 (parfait): one of those should look like it almost
  // overflows the play area. Smaller drinks scale down from there.
  // Lv8 visible diameter ≈ playW * 0.64 (with VISIBLE_FACTOR[8]=0.58 and ratio 2.5)
  const baseUnit = Math.min(playW / 4.5, H / 10.5);
  for (let lv = 1; lv <= MAX_LEVEL; lv++) {
    RADIUS[lv] = baseUnit * RADIUS_RATIO[lv];
  }
}

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  recomputeBounds();
  recomputeRadii();
  player.x = W / 2;
  player.y = H - PLAYER_Y_PAD;
}
window.addEventListener('resize', () => { if (running) resizeCanvas(); });

// ===== Game lifecycle =====
function startGame() {
  document.getElementById('title-screen').hidden = true;
  document.getElementById('game-screen').hidden = false;
  resizeCanvas();
  drinks = [];
  player.level = randomDrink();
  player.cooldown = 0;
  nextLevel = randomDrink();
  score = 0;
  orderNum = 0;
  unlocked = new Set();
  dangerTimer = 0;
  aim = 0;
  aiming = false;
  aimPointerId = null;
  mergeFlashes = [];
  nextOrder();
  buildRecipeBar();
  updateHUD();
  running = true;
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function nextOrder() {
  orderNum++;
  const def = generateOrder(orderNum);
  order = { level: def.level, count: def.count, made: 0 };
  updateHUD();
}

function gameOver() {
  running = false;
  const isNew = trySaveHighScore(score);
  const high = getHighScore();
  refreshHsDisplay();
  const recordTag = isNew ? `<div class="new-record">★ NEW RECORD ★</div>` : '';
  showOverlay(
    'GAME OVER',
    `${recordTag}SCORE: <b>${score}</b><br>HIGH: <b>${high}</b><br>注文クリア: <b>${orderNum - 1}</b>`,
    'もう一度',
    () => { startGame(); }
  );
}

// ===== Physics =====
function physicsStep(dt) {
  const decay = Math.exp(-FRICTION_K * dt);
  for (const d of drinks) {
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    d.vx *= decay;
    d.vy *= decay;
    if (Math.hypot(d.vx, d.vy) < MIN_SPEED) { d.vx = 0; d.vy = 0; }
    // continuous gentle pull toward the back, applied after zeroing so even
    // settled drinks creep into each other for tight packing
    d.vy -= BACK_PULL * dt;
    if (d.x - d.radius < wallLeft) { d.x = wallLeft + d.radius; d.vx = -d.vx * WALL_BOUNCE_SIDE; }
    else if (d.x + d.radius > wallRight) { d.x = wallRight - d.radius; d.vx = -d.vx * WALL_BOUNCE_SIDE; }
    if (d.y - d.radius < 0) { d.y = d.radius; d.vy = 0; }
    else if (d.y + d.radius > H) { d.y = H - d.radius; d.vy = 0; }
  }
  resolveCollisions();
  for (let iter = 0; iter < 6; iter++) {
    if (!doOneMerge()) break;
  }
  // No-forward-bounce rule: drinks never bounce back toward the player.
  // Any velocity component pushing toward the bottom (player side) is absorbed.
  for (const d of drinks) {
    if (d.vy > 0) d.vy = 0;
  }
}

function resolveCollisions() {
  for (let pass = 0; pass < 2; pass++) {
    for (let i = 0; i < drinks.length; i++) {
      for (let j = i + 1; j < drinks.length; j++) {
        const a = drinks[i], b = drinks[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const minDist = a.radius + b.radius;
        if (dist >= minDist) continue;
        if (dist === 0) { a.x -= 0.5; b.x += 0.5; continue; }
        const nx = dx / dist;
        const ny = dy / dist;
        const overlap = minDist - dist;
        const totalMass = a.mass + b.mass;
        a.x -= nx * overlap * (b.mass / totalMass);
        a.y -= ny * overlap * (b.mass / totalMass);
        b.x += nx * overlap * (a.mass / totalMass);
        b.y += ny * overlap * (a.mass / totalMass);
        const dvx = b.vx - a.vx;
        const dvy = b.vy - a.vy;
        const rel = dvx * nx + dvy * ny;
        if (rel < 0) {
          const j2 = -(1 + COLL_E) * rel / (1 / a.mass + 1 / b.mass);
          a.vx -= (j2 / a.mass) * nx;
          a.vy -= (j2 / a.mass) * ny;
          b.vx += (j2 / b.mass) * nx;
          b.vy += (j2 / b.mass) * ny;
        }
      }
    }
  }
}

function doOneMerge() {
  for (let i = 0; i < drinks.length; i++) {
    for (let j = i + 1; j < drinks.length; j++) {
      const a = drinks[i], b = drinks[j];
      if (a.level !== b.level) continue;
      if (a.level >= MAX_LEVEL) continue;
      const dist = Math.hypot(b.x - a.x, b.y - a.y);
      if (dist <= a.radius + b.radius + 1) {
        const newLevel = a.level + 1;
        const cx = (a.x + b.x) / 2;
        const cy = (a.y + b.y) / 2;
        const newDrink = new Drink(newLevel, cx, cy, (a.vx + b.vx) / 2, (a.vy + b.vy) / 2);
        if (newDrink.x - newDrink.radius < wallLeft) newDrink.x = wallLeft + newDrink.radius;
        if (newDrink.x + newDrink.radius > wallRight) newDrink.x = wallRight - newDrink.radius;
        if (newDrink.y - newDrink.radius < 0) newDrink.y = newDrink.radius;
        if (newDrink.y + newDrink.radius > H) newDrink.y = H - newDrink.radius;
        drinks[i] = newDrink;
        drinks.splice(j, 1);
        unlocked.add(newLevel);
        score += newLevel * 12;
        mergeFlashes.push({ x: cx, y: cy, t: 0 });
        if (order && newLevel === order.level) {
          order.made++;
          if (order.made >= order.count) {
            const reward = 100 * order.level + 50 * order.count;
            score += reward;
            flashOrderClear(reward);
            nextOrder();
          }
        }
        return true;
      }
    }
  }
  return false;
}

const DANGER_Y = () => H - DANGER_PAD;
function checkGameOver(dt) {
  let bad = false;
  const dy = DANGER_Y();
  for (const d of drinks) {
    if (d.y + d.radius * 0.4 > dy && Math.hypot(d.vx, d.vy) < 14) {
      bad = true; break;
    }
  }
  if (bad) {
    dangerTimer += dt;
    if (dangerTimer > 0.6) gameOver();
  } else {
    dangerTimer = Math.max(0, dangerTimer - dt * 1.5);
  }
}

// ===== Rendering =====
function render() {
  // outer bezel (table edge / wood frame)
  const bezelGrad = ctx.createLinearGradient(0, 0, 0, H);
  bezelGrad.addColorStop(0, '#A87A4A');
  bezelGrad.addColorStop(0.18, '#8B5A2B');
  bezelGrad.addColorStop(1, '#5D3A1A');
  ctx.fillStyle = bezelGrad;
  ctx.fillRect(0, 0, W, H);
  // subtle wood-grain stripes on bezel
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let i = 0; i < 6; i++) {
    const yy = (i / 6) * H + (i % 2) * 12;
    ctx.fillRect(0, yy, wallLeft, 2);
    ctx.fillRect(wallRight, yy, W - wallRight, 2);
  }

  // play area bright background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#FFEED5');
  grad.addColorStop(0.18, '#F5D08C');
  grad.addColorStop(0.18, '#E0B070');
  grad.addColorStop(1, '#B8884E');
  ctx.fillStyle = grad;
  const playW = wallRight - wallLeft;
  ctx.fillRect(wallLeft, 0, playW, H);

  // inner shadow lines along bezel edges
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.fillRect(wallLeft - 1, 0, 2, H);
  ctx.fillRect(wallRight - 1, 0, 2, H);

  // back wall hint shadow
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.fillRect(wallLeft, 0, playW, 4);

  // perspective lines within play area
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(wallLeft + playW * 0.06, H);
  ctx.lineTo(wallLeft + playW * 0.38, 0);
  ctx.moveTo(wallLeft + playW * 0.94, H);
  ctx.lineTo(wallLeft + playW * 0.62, 0);
  ctx.stroke();

  // table edge under HUD
  ctx.fillStyle = 'rgba(139, 90, 43, 0.18)';
  ctx.fillRect(wallLeft, H * 0.18, playW, 1.5);

  // danger line (within play area only)
  const dyL = DANGER_Y();
  const dangerAlpha = 0.35 + 0.5 * Math.min(1, dangerTimer / 0.6);
  ctx.strokeStyle = `rgba(229, 57, 53, ${dangerAlpha})`;
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 7]);
  ctx.beginPath();
  ctx.moveTo(wallLeft, dyL);
  ctx.lineTo(wallRight, dyL);
  ctx.stroke();
  ctx.setLineDash([]);

  // drinks
  for (const d of drinks) drawDrinkAt(d.level, d.x, d.y);

  // merge sparkles
  for (let i = mergeFlashes.length - 1; i >= 0; i--) {
    const f = mergeFlashes[i];
    const alpha = 1 - f.t / 0.5;
    if (alpha <= 0) { mergeFlashes.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(f.x, f.y, 24 + f.t * 80, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 200, 80, ${alpha})`;
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  // aim guide
  drawAimGuide();

  // pedestal under player
  const pr = RADIUS[player.level];
  ctx.fillStyle = 'rgba(139, 90, 43, 0.28)';
  ctx.beginPath();
  ctx.ellipse(player.x, player.y + pr * 0.85, pr * 1.15, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // player drink
  drawDrinkAt(player.level, player.x, player.y, 1.06);

  // next preview at top-right corner of canvas
  drawNextPreview();
}

function drawAimGuide() {
  const dirX = Math.sin(aim);
  const dirY = -Math.cos(aim);
  const pr = RADIUS[player.level];
  const startX = player.x + dirX * pr * 1.0;
  const startY = player.y + dirY * pr * 1.0;
  const len = Math.min(H * 0.55, 360);
  const endX = startX + dirX * len;
  const endY = startY + dirY * len;

  // cone limit hint (faint arc)
  if (aiming) {
    ctx.strokeStyle = 'rgba(255, 140, 66, 0.22)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(player.x, player.y, len * 0.55, -Math.PI / 2 - ANGLE_LIMIT, -Math.PI / 2 + ANGLE_LIMIT);
    ctx.stroke();
    // boundary rays
    ctx.strokeStyle = 'rgba(255, 140, 66, 0.16)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    for (const a of [-ANGLE_LIMIT, ANGLE_LIMIT]) {
      const bx = player.x + Math.sin(a) * len;
      const by = player.y + (-Math.cos(a)) * len;
      ctx.beginPath();
      ctx.moveTo(player.x, player.y);
      ctx.lineTo(bx, by);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // main aim line
  ctx.strokeStyle = aiming ? 'rgba(229, 57, 53, 0.92)' : 'rgba(229, 57, 53, 0.5)';
  ctx.lineWidth = aiming ? 6 : 4;
  ctx.lineCap = 'round';
  ctx.setLineDash([14, 10]);
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  ctx.lineTo(endX, endY);
  ctx.stroke();
  ctx.setLineDash([]);

  // arrowhead
  const ah = aiming ? 22 : 16;
  ctx.fillStyle = aiming ? 'rgba(229, 57, 53, 0.95)' : 'rgba(229, 57, 53, 0.55)';
  const px = -dirY, py = dirX;
  ctx.beginPath();
  ctx.moveTo(endX, endY);
  ctx.lineTo(endX - dirX * ah + px * ah * 0.55, endY - dirY * ah + py * ah * 0.55);
  ctx.lineTo(endX - dirX * ah - px * ah * 0.55, endY - dirY * ah - py * ah * 0.55);
  ctx.closePath();
  ctx.fill();
}

function drawDrinkAt(level, x, y, scale = 1) {
  const img = drinkImages[level];
  const r = RADIUS[level] * scale;
  if (img) ctx.drawImage(img, x - r, y - r, r * 2, r * 2);
  else {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${30 + level * 25}, 70%, 60%)`;
    ctx.fill();
  }
}

function drawNextPreview() {
  const r = Math.min(28, W * 0.07);
  const x = W - r - 14;
  const y = r + 14;
  // bg
  ctx.fillStyle = 'rgba(255, 248, 230, 0.92)';
  ctx.beginPath();
  ctx.roundRect(x - r - 6, y - r - 6, (r + 6) * 2, (r + 6) * 2 + 12, 8);
  ctx.fill();
  ctx.fillStyle = '#8B5A2B';
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT', x, y + r + 12);
  const img = drinkImages[nextLevel];
  if (img) ctx.drawImage(img, x - r, y - r, r * 2, r * 2);
}

// ===== Loop =====
function loop(t) {
  if (!running) return;
  const dtRaw = (t - lastTime) / 1000;
  lastTime = t;
  const dt = Math.min(0.033, dtRaw);

  if (player.cooldown > 0) player.cooldown = Math.max(0, player.cooldown - dt);

  physicsStep(dt);
  for (const f of mergeFlashes) f.t += dt;
  checkGameOver(dt);

  render();
  updateHUD();

  requestAnimationFrame(loop);
}

// ===== HUD =====
function buildRecipeBar() {
  const bar = document.getElementById('recipe-bar');
  bar.innerHTML = '';
  for (let lv = 1; lv <= MAX_LEVEL; lv++) {
    const cell = document.createElement('div');
    cell.className = 'recipe-cell';
    cell.innerHTML = svgFor(lv) + `<div class="lvnum">${lv}</div>`;
    bar.appendChild(cell);
  }
}

function updateHUD() {
  document.getElementById('score-value').textContent = score;
  if (order) {
    document.getElementById('order-name').textContent = DRINKS[order.level].name;
    document.getElementById('order-progress').textContent = `${order.made}/${order.count}`;
    document.getElementById('order-img').innerHTML = svgFor(order.level);
  }
  const recipeCells = document.querySelectorAll('.recipe-cell');
  for (let lv = 1; lv <= MAX_LEVEL; lv++) {
    if (recipeCells[lv - 1])
      recipeCells[lv - 1].classList.toggle('unlocked', unlocked.has(lv));
  }
}

function flashOrderClear(reward) {
  const f = document.getElementById('order-flash');
  f.textContent = `お渡し!  +${reward}`;
  f.classList.remove('show');
  void f.offsetWidth;
  f.classList.add('show');
}

function showOverlay(title, body, btnText, btnAction) {
  const old = document.querySelector('.overlay');
  if (old) old.remove();
  const div = document.createElement('div');
  div.className = 'overlay';
  div.innerHTML = `
    <h2>${title}</h2>
    <p>${body}</p>
    <button class="btn">${btnText}</button>
    <button class="btn secondary" id="ov-title">タイトルへ</button>
  `;
  div.querySelector('.btn').addEventListener('click', () => {
    div.remove();
    btnAction();
  });
  div.querySelector('#ov-title').addEventListener('click', () => {
    div.remove();
    document.getElementById('title-screen').hidden = false;
    document.getElementById('game-screen').hidden = true;
    refreshHsDisplay();
  });
  document.body.appendChild(div);
}

// ===== Input (aim + release-to-fire) =====
function pointerXY(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function updateAimFromPointer(e) {
  const { x, y } = pointerXY(e);
  const dx = x - player.x;
  const dy = y - player.y;
  let angle;
  if (dy >= 0) {
    // pointer below player — clamp to nearest edge of cone
    angle = dx >= 0 ? ANGLE_LIMIT : -ANGLE_LIMIT;
  } else {
    angle = Math.atan2(dx, -dy);
    angle = Math.max(-ANGLE_LIMIT, Math.min(ANGLE_LIMIT, angle));
  }
  aim = angle;
}

canvas.addEventListener('pointerdown', (e) => {
  if (!running || player.cooldown > 0) return;
  if (aiming) return;
  e.preventDefault();
  aiming = true;
  aimPointerId = e.pointerId;
  updateAimFromPointer(e);
  try { canvas.setPointerCapture(e.pointerId); } catch {}
});

canvas.addEventListener('pointermove', (e) => {
  if (!aiming || e.pointerId !== aimPointerId) return;
  updateAimFromPointer(e);
});

canvas.addEventListener('pointerup', (e) => {
  if (!aiming || e.pointerId !== aimPointerId) return;
  try { canvas.releasePointerCapture(e.pointerId); } catch {}
  aiming = false;
  aimPointerId = null;
  fireAtAim();
});

canvas.addEventListener('pointercancel', (e) => {
  if (!aiming || e.pointerId !== aimPointerId) return;
  try { canvas.releasePointerCapture(e.pointerId); } catch {}
  aiming = false;
  aimPointerId = null;
});

function fireAtAim() {
  if (player.cooldown > 0) return;
  const dirX = Math.sin(aim);
  const dirY = -Math.cos(aim);
  const vx = dirX * FIRE_SPEED;
  const vy = dirY * FIRE_SPEED;
  fire(vx, vy);
  aim = 0;
}

function fire(vx, vy) {
  if (player.cooldown > 0) return;
  const r = RADIUS[player.level];
  const d = new Drink(player.level, player.x, player.y - r * 0.2, vx, vy);
  drinks.push(d);
  unlocked.add(player.level);
  player.level = nextLevel;
  nextLevel = randomDrink();
  player.cooldown = 0.18;
}

// ===== Title button =====
document.getElementById('start-btn').addEventListener('click', startGame);

// ===== Keyboard fallback =====
document.addEventListener('keydown', (e) => {
  if (document.getElementById('game-screen').hidden) {
    if ((e.key === 'Enter' || e.key === ' ') && !document.getElementById('title-screen').hidden) {
      e.preventDefault();
      startGame();
    }
    return;
  }
  if (document.querySelector('.overlay')) return;
  if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
    e.preventDefault();
    fireAtAim();
  } else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
    aim = Math.max(-ANGLE_LIMIT, aim - 0.08);
  } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
    aim = Math.min(ANGLE_LIMIT, aim + 0.08);
  }
});

// ===== Init =====
preloadDrinks().then(() => {
  document.getElementById('title-icon').innerHTML = svgFor(7);
});
refreshHsDisplay();

// roundRect polyfill for older Safari
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.beginPath();
    this.moveTo(x + r, y);
    this.arcTo(x + w, y,   x + w, y + h, r);
    this.arcTo(x + w, y + h, x,     y + h, r);
    this.arcTo(x,     y + h, x,     y,     r);
    this.arcTo(x,     y,     x + w, y,     r);
    this.closePath();
    return this;
  };
}
